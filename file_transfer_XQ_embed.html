<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">


        ///================= XQ HELPER METHODS =====================
        const cfg =
           {
                DASHBOARD_URL: "https://dashboard.xqmsg.net/v2",
                SUBSCRIPTION_URL: "https://subscription.xqmsg.net/v2",
                VALIDATION_URL: "https://validation.xqmsg.net/v2",
                MANAGE_URL: "https://manage.xqmsg.com",
                DASHBOARD_API_KEY: "c42b63bc-0b63-4b49-a675-7f55bb1c4a7a-fdc5dab9-95e2-44e6-97e5-0559d5fca9ad",
                GENERAL_API_KEY: "f243c6d1-e75f-4837-b786-4569019ddb6a-c76cf034-e4cc-42e3-82b9-657910ccbb0a",
                TEAM_ID: 11660, // This must match a valid dashboard team. Only members of this team will be allowed to connect.
                IDENTITY_RECIPIENT: 'pqc@identity.local',
                IDENTITY_TITLE: 'PQC Public Identity',
                IDENTITY_TAG : 'PQC | Identity',
                IDENTITY_EXPIRATION_DAYS: 365,
                FILE_EXPIRATION_DAYS: 7
            };

            /*
            {
                DASHBOARD_URL: "http://localhost:4819/v2",
                SUBSCRIPTION_URL:  "http://localhost:9819/v2",
                VALIDATION_URL:  "http://localhost:8818/v2",
                MANAGE_URL: "http://localhost:3000",
                DASHBOARD_API_KEY: "3cc605ae-7676-4cb2-9670-9539adf78bf2-8577ec5d-30b3-4434-818c-b980bb023b0b",
                GENERAL_API_KEY: "7b7450ec-cc43-4c41-ac78-ebf3c2a494f5-e7317c94-c6d7-40d4-b781-e1a2359f7ad7",
                TEAM_ID: 7673, // This must match a valid dashboard team. Only members of this team will be allowed to connect.
                IDENTITY_RECIPIENT: 'pqc@identity.local',
                IDENTITY_TITLE: 'PQC Public Identity',
                IDENTITY_TAG : 'PQC | Identity',
                IDENTITY_EXPIRATION_DAYS: 365,
                FILE_EXPIRATION_DAYS: 7
            }; */


        const _getScopedKey = (key) => {
            const user = sessionStorage.getItem('currentUser');
            return user ? `${key}_${user}` : key;
        };

        const _apiFetch = async (url, options = {}) => {
            const response = await fetch(url, options);
            if (!response.ok) {
                throw new Error(await response.text());
            }
            return response;
        };

        /** --- STORAGE HELPERS --- */
        export const setCurrentUser = (email) => sessionStorage.setItem('currentUser', email);

        export const readLocalStorage = (key) => localStorage.getItem(_getScopedKey(key));
        export const writeLocalStorage = (key, value) => localStorage.setItem(_getScopedKey(key), value);

        export const readSessionStorage = (key) => sessionStorage.getItem(_getScopedKey(key));
        export const writeSessionStorage = (key, value) => sessionStorage.setItem(_getScopedKey(key), value);
        export const removeSessionStorage = (key) => sessionStorage.removeItem(_getScopedKey(key));

        const DEVICE_ID_STORAGE_KEY = 'xqDeviceId';
        const DEVICE_ID_ALPHABET = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';

        const readDeviceId = () => localStorage.getItem(DEVICE_ID_STORAGE_KEY) || '';
        const writeDeviceId = (value) => {
            localStorage.setItem(DEVICE_ID_STORAGE_KEY, value);
            return value;
        };

        const normalizeToDeviceId = (seed = '') => {
            let hash = 2166136261;
            for (let i = 0; i < seed.length; i++) {
                hash ^= seed.charCodeAt(i);
                hash = Math.imul(hash, 16777619);
            }

            let value = hash >>> 0;
            let deviceId = '';
            for (let i = 0; i < 6; i++) {
                deviceId = DEVICE_ID_ALPHABET[value & 31] + deviceId;
                value = value >>> 5;
            }
            return deviceId;
        };

        const getDeviceId = () => {
            return readDeviceId();
        };

        const ensureDeviceId = async () => {
            const cached = readDeviceId();
            if (cached) return cached;

            if (!window.FingerprintJS?.load) {
                throw new Error('FingerprintJS is not available');
            }

            const fp = await window.FingerprintJS.load();
            const result = await fp.get();
            if (!result?.visitorId) {
                throw new Error('FingerprintJS failed to provide visitorId');
            }

            const normalized = normalizeToDeviceId(result.visitorId);
            writeDeviceId(normalized);
            return normalized;
        };

        /** --- SERIALIZATION --- */

        /**
         * Serializeds the keypair payload to json
         * @param obj The javascript keypair to serialize
         */
        const serializeKeys = (obj) => JSON.stringify(obj, (key, value) => {
            if (value instanceof Uint8Array) {
                return { _type: 'Uint8Array', data: Array.from(value) };
            }
            return value;
        });

        /**
         * Deserializes the keypair payload from json
         * @param jsonString The json payload to deserialize
         */
        const deserializeKeys = (jsonString) => JSON.parse(jsonString, (key, value) => {
            if (value?._type === 'Uint8Array') {
                return new Uint8Array(value.data);
            }
            return value;
        });

        const parseCommunicationMeta = (meta) => {
            if (!meta) return {};
            if (typeof meta === 'object') return meta;

            try {
                return JSON.parse(meta);
            } catch (error) {
                return {};
            }
        };

        const parseDeviceIdFromTitle = (title = '') => {
            const match = title.match(/([A-Z0-9]{6})$/);
            return match ? match[1] : '';
        };

        const isSamePublicIdentityKey = (left, right) => {
            if (!left || !right) return false;

            const hasKyber = typeof left.kyberPublicKey === 'string' && typeof right.kyberPublicKey === 'string';
            const hasDilithium = typeof left.dilithiumPublicKey === 'string' && typeof right.dilithiumPublicKey === 'string';

            if (hasKyber && hasDilithium) {
                return left.kyberPublicKey === right.kyberPublicKey
                    && left.dilithiumPublicKey === right.dilithiumPublicKey;
            }

            return typeof left.fingerprint === 'string'
                && typeof right.fingerprint === 'string'
                && left.fingerprint === right.fingerprint;
        };

        const deleteKeyByToken = async (token, xqAccessToken) => {
            if (!token) return false;

            try {
                await _apiFetch(`${cfg.VALIDATION_URL}/key`, {
                    method: 'DELETE',
                    headers: {
                        "Api-Key": cfg.GENERAL_API_KEY,
                        "Authorization": `Bearer ${xqAccessToken}`,
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ tokens: [token] }),
                });
                return true;
            } catch (error) {
                return false;
            }
        };

        /** --- API ACTIONS --- */

        /**
         * Request XQ email authorization.
         * @param email The user email address.
         * @returns {Promise<Error|boolean>} An exchange token to be used during validation.
         */
        export const requestAuthorization = async (email) => {
            setCurrentUser(email);
            try {
                const response = await _apiFetch(`${cfg.SUBSCRIPTION_URL}/authorize`, {
                    method: "POST",
                    headers: {
                        "Api-Key": cfg.GENERAL_API_KEY,
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ user: email, codetype: "code" }),
                });

                writeSessionStorage("exchange", await response.text());
                return true;
            } catch (error) {
                console.error(error);
                return error;
            }
        };

        /**
         * Request a general access token post-validation.
         * @returns {Promise<Error|boolean>}
         */
        const exchangeToken = async () => {
            const exchange = readSessionStorage("exchange");
            if (!exchange) return new Error("Unauthorized");

            try {
                const url = `${cfg.SUBSCRIPTION_URL}/exchange?b=${cfg.TEAM_ID}`;
                const response = await _apiFetch(url, {
                    headers: {
                        "Api-Key": cfg.GENERAL_API_KEY,
                        "Authorization": `Bearer ${exchange}`,
                    },
                });

                writeSessionStorage("token", await response.text());
                removeSessionStorage("exchange");
                return true;
            } catch (error) {
                return error;
            }
        };

        /**
         *  Request a valid dashboard token from a valid general access token
         * @returns {Promise<{status: *}|Error|boolean>}
         */
        const acquireDashboardToken = async () => {
            const token = readSessionStorage("token");
            if (!token) return new Error("Unauthorized");

            try {
                const url = `${cfg.DASHBOARD_URL}/login/verify?bid=${cfg.TEAM_ID}`;
                const response = await _apiFetch(url, {
                    headers: {
                        "Api-Key": cfg.DASHBOARD_API_KEY,
                        "Authorization": `Bearer ${token}`,
                    },
                });

                writeSessionStorage("dashboardToken", await response.text());
                return true;
            } catch (error) {
                return error;
            }
        };

        /**
         * Validate an XQ user by their confirmation PIN.
         * @param pin{string} The PIN number received in the email.
         * @returns {Promise<Error|boolean>}
         */
        export const validateAuthorization = async (pin) => {
            const exchange = readSessionStorage("exchange");
            if (!exchange) return new Error("Unauthorized");

            try {
                const url = `${cfg.SUBSCRIPTION_URL}/codevalidation?pin=${pin}`;
                await _apiFetch(url, {

         */
        export const storeIdentityKeys = async (keys, pubKeys) => {
            const token = readSessionStorage("token");
            if (!token) return { status: "Unauthorized" };

            try {
                const deviceId = await ensureDeviceId();
                const identityTitle = `${cfg.IDENTITY_TITLE} - ${deviceId}`;
                const dashboardToken = readSessionStorage("dashboardToken");
                let replacedCount = 0;

                if (dashboardToken) {
                    const response = await _apiFetch(`${cfg.DASHBOARD_URL}/communications?recipients=${cfg.IDENTITY_RECIPIENT}`, {
                        headers: {
                            "Api-Key": cfg.DASHBOARD_API_KEY,
                            "Authorization": `Bearer ${dashboardToken}`,
                        },
                    });

                    const { communications = [] } = await response.json();
                    const activeCommunications = communications.filter(contact => contact.status === 0);

                    for (const contact of activeCommunications) {
                        if (!contact?.token) continue;
                        if (contact.user === pubKeys.name) continue;

                        try {
                            const keyResponse = await _apiFetch(`${cfg.VALIDATION_URL}/key/${contact.token}`, {
                                headers: {
                                    "Api-Key": cfg.GENERAL_API_KEY,
                                    "Authorization": `Bearer ${token}`,
                                },
                            });

                            const existingPubKey = JSON.parse(atob(await keyResponse.text()));
                            if (isSamePublicIdentityKey(existingPubKey, pubKeys)) {
                                return new Error(`Key import blocked: this key is already registered in XQ for another user (${contact.user}).`);
                            }
                        } catch (error) {
                        }
                    }

                    const existingIdentities = activeCommunications.filter(contact => {
                        if (contact.user !== pubKeys.name) return false;
                        const meta = parseCommunicationMeta(contact.meta);
                        return (meta?.title || '') === identityTitle;
                    });

                    for (const identity of existingIdentities) {
                        const replaced = await deleteKeyByToken(identity.token, token);
                        if (!replaced) {
                            return new Error(`Failed to replace existing identity '${identityTitle}' in XQ`);
                        }
                        replacedCount += 1;
                    }
                }

                const data = {
                    recipients: [cfg.IDENTITY_RECIPIENT, "team@group.local"],
                    expires: cfg.IDENTITY_EXPIRATION_DAYS,
                    unit: 'days',
                    type: 'file',
                    key: btoa(JSON.stringify(pubKeys)),
                    meta: {
                        title: identityTitle,
                        type: 'keypair',
                        labels: [cfg.IDENTITY_TAG]
                    }
                };

                await _apiFetch(`${cfg.SUBSCRIPTION_URL}/packet/add`, {
                    method: "POST",
                    headers: {
                        "Api-Key": cfg.GENERAL_API_KEY,
                        "Authorization": `Bearer ${token}`,
                    },
                    body: JSON.stringify(data),
                });

                writeLocalStorage("idKeys", serializeKeys(keys));
                return { replacedCount };
            } catch (error) {
                return error;
            }
        };

        const QRYPTO_DELTA = 524288;
        const QRYPTO_CUBE_SIZE = 16;
        const QRYPTO_PALETTE = [
            '#e74c3c', '#e67e22', '#f39c12', '#f1c40f',
            '#2ecc71', '#1abc9c', '#16a085', '#27ae60',
            '#3498db', '#2980b9', '#9b59b6', '#8e44ad',

        const qryptoSha256bytes = (data) => {
            const message = data instanceof Uint8Array ? data : new TextEncoder().encode(data);
            const K = [
                0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,

                0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
                0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
                0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
                0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
            ];
            let h0 = 0x6a09e667;
            let h1 = 0xbb67ae85;
            let h2 = 0x3c6ef372;
            let h3 = 0xa54ff53a;
            let h4 = 0x510e527f;
            let h5 = 0x9b05688c;
            let h6 = 0x1f83d9ab;
            let h7 = 0x5be0cd19;
            const len = message.length;
            const bitLen = len * 8;
            const pad = new Uint8Array(len + 1 + ((55 - (len % 64) + 64) % 64) + 8);
            pad.set(message);
            pad[len] = 0x80;
            const view = new DataView(pad.buffer);
            view.setUint32(pad.length - 4, bitLen >>> 0, false);
            view.setUint32(pad.length - 8, Math.floor(bitLen / 0x100000000), false);

            for (let offset = 0; offset < pad.length; offset += 64) {
                const w = new Uint32Array(64);
                for (let index = 0; index < 16; index++) {
                    w[index] = view.getUint32(offset + index * 4, false);
                }
                for (let index = 16; index < 64; index++) {
                    const s0 = ((w[index - 15] >>> 7) | (w[index - 15] << 25)) ^ ((w[index - 15] >>> 18) | (w[index - 15] << 14)) ^ (w[index - 15] >>> 3);
                    const s1 = ((w[index - 2] >>> 17) | (w[index - 2] << 15)) ^ ((w[index - 2] >>> 19) | (w[index - 2] << 13)) ^ (w[index - 2] >>> 10);
                    w[index] = (w[index - 16] + s0 + w[index - 7] + s1) >>> 0;
                }

                let a = h0;
                let b = h1;
                let c = h2;
                let d = h3;
                let e = h4;
                let f = h5;
                let g = h6;
                let h = h7;

                for (let index = 0; index < 64; index++) {
                    const S1 = ((e >>> 6) | (e << 26)) ^ ((e >>> 11) | (e << 21)) ^ ((e >>> 25) | (e << 7));
                    const ch = (e & f) ^ (~e & g);
                    const t1 = (h + S1 + ch + K[index] + w[index]) >>> 0;
                    const S0 = ((a >>> 2) | (a << 30)) ^ ((a >>> 13) | (a << 19)) ^ ((a >>> 22) | (a << 10));
                    const maj = (a & b) ^ (a & c) ^ (b & c);
                    const t2 = (S0 + maj) >>> 0;
                    h = g;
                    g = f;
                    f = e;
                    e = (d + t1) >>> 0;
                    d = c;
                    c = b;
                    b = a;
                    a = (t1 + t2) >>> 0;
                }

                h0 = (h0 + a) >>> 0;
                h1 = (h1 + b) >>> 0;
                h2 = (h2 + c) >>> 0;
                h3 = (h3 + d) >>> 0;
                h4 = (h4 + e) >>> 0;
                h5 = (h5 + f) >>> 0;
                h6 = (h6 + g) >>> 0;
                h7 = (h7 + h) >>> 0;
            }

            const out = new Uint8Array(32);
            const outView = new DataView(out.buffer);
            [h0, h1, h2, h3, h4, h5, h6, h7].forEach((value, index) => outView.setUint32(index * 4, value, false));
            return out;
        };

        const qryptoConcatBytes = (...arrays) => {
            const out = new Uint8Array(arrays.reduce((sum, item) => sum + item.length, 0));
            let offset = 0;
            arrays.forEach((item) => {
                out.set(item, offset);
                offset += item.length;
            });
            return out;
        };

        const qryptoIndexBytes = (value) => new Uint8Array([(value >> 8) & 255, value & 255]);
        const qryptoBytesToU32 = (array) => (((array[0] << 24) | (array[1] << 16) | (array[2] << 8) | array[3]) >>> 0);

        const qryptoComputeLayers = (seed) => {
            const walkTag = new TextEncoder().encode('walk');
            const base = [];
            for (let index = 0; index < 256; index++) {
                const hash = qryptoSha256bytes(qryptoConcatBytes(seed, qryptoIndexBytes(index)));
                base.push(qryptoBytesToU32(hash) % QRYPTO_Q);
            }

            const layers = [base];
            for (let layer = 1; layer < 16; layer++) {
                const prev = layers[layer - 1];
                const next = [];
                for (let index = 0; index < 256; index++) {
                    const hash = qryptoSha256bytes(qryptoConcatBytes(seed, walkTag, new Uint8Array([layer]), qryptoIndexBytes(index)));
                    const sign = (hash[0] & 1) ? 1 : -1;
                    let coefficient = prev[index] + sign * QRYPTO_DELTA;
                    if (coefficient < 0 || coefficient >= QRYPTO_Q) coefficient = prev[index] - sign * QRYPTO_DELTA;
                    next.push(coefficient);
                }
                layers.push(next);
            }
            return layers;
        };

        const qryptoValueColor = (value) => QRYPTO_PALETTE[Math.min(Math.floor(value / (QRYPTO_Q / 16)), 15)];
        const qryptoHexInt = (hex) => parseInt(hex.slice(1), 16);

        // ==================== LATTICE CUBE COMPONENT ====================
        const LatticeCube = ({ size = 200, className = "", colorBytes = null, seedEmail = "" }) => {

                if (colorBytes instanceof Uint8Array && colorBytes.length > 0) return colorBytes;

            }, [colorBytes, seedEmail]);

            const cubeData = useMemo(() => qryptoComputeLayers(seedBytes), [seedBytes]);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas || !window.THREE) return undefined;

                const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
                renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
                renderer.setClearColor(0x000000, 0);
                renderer.setSize(size, size, false);

                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 600);
                camera.position.set(0, 0, 52);

                scene.add(new THREE.AmbientLight(0xffffff, 1.0));
                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.3);
                directionalLight.position.set(1, 1, 1);
                scene.add(directionalLight);

                const pivot = new THREE.Group();
                scene.add(pivot);

                const geometry = new THREE.SphereGeometry(0.19, 10, 7);
                const spacing = 1.1;
                const offset = ((QRYPTO_CUBE_SIZE - 1) * spacing) / 2;
                const meshes = [];

                for (let layer = 0; layer < 16; layer++) {
                    for (let index = 0; index < 256; index++) {
                        const column = index % 16;
                        const row = Math.floor(index / 16);
                        const material = new THREE.MeshLambertMaterial({ color: qryptoHexInt(qryptoValueColor(cubeData[layer][index])) });
                        const mesh = new THREE.Mesh(geometry, material);
                        mesh.position.set(column * spacing - offset, -(row * spacing - offset), -(layer * spacing - offset));
                        pivot.add(mesh);
                        meshes.push(mesh);
                    }
                }

                let rotX = 0.45;
                let rotY = 0.55;
                let dragging = false;
                let prevX = 0;
                let prevY = 0;

                const applyRotation = () => {
                    pivot.rotation.x = rotX;
                    pivot.rotation.y = rotY;
                };

                const onPointerDown = (event) => {
                    dragging = true;
                    prevX = event.clientX;
                    prevY = event.clientY;
                };

                const onPointerMove = (event) => {
                    if (!dragging) return;
                    rotY += (event.clientX - prevX) * 0.01;
                    rotX += (event.clientY - prevY) * 0.01;
                    prevX = event.clientX;
                    prevY = event.clientY;
                    applyRotation();
                };

                const onPointerUp = () => {
                    dragging = false;
                };

                const onTouchStart = (event) => {
                    if (!event.touches.length) return;
                    dragging = true;
                    prevX = event.touches[0].clientX;
                    prevY = event.touches[0].clientY;
                };

                const onTouchMove = (event) => {
                    if (!dragging || !event.touches.length) return;
                    rotY += (event.touches[0].clientX - prevX) * 0.01;
                    rotX += (event.touches[0].clientY - prevY) * 0.01;
                    prevX = event.touches[0].clientX;
                    prevY = event.touches[0].clientY;
                    applyRotation();
                };

                const renderLoop = () => {
                    if (!dragging) {
                        rotY += 0.005;
                        applyRotation();
                    }
                    renderer.render(scene, camera);
                    animationRef.current = requestAnimationFrame(renderLoop);
                };

                applyRotation();
                canvas.addEventListener('mousedown', onPointerDown);
                canvas.addEventListener('touchstart', onTouchStart, { passive: true });
                window.addEventListener('mousemove', onPointerMove);
                window.addEventListener('mouseup', onPointerUp);
                window.addEventListener('touchmove', onTouchMove, { passive: true });
                window.addEventListener('touchend', onPointerUp);
                animationRef.current = requestAnimationFrame(renderLoop);

                return () => {
                    cancelAnimationFrame(animationRef.current);
                    canvas.removeEventListener('mousedown', onPointerDown);
                    canvas.removeEventListener('touchstart', onTouchStart);
                    window.removeEventListener('mousemove', onPointerMove);
                    window.removeEventListener('mouseup', onPointerUp);
                    window.removeEventListener('touchmove', onTouchMove);
                    window.removeEventListener('touchend', onPointerUp);
                    meshes.forEach((mesh) => {
                        mesh.material.dispose();
                        pivot.remove(mesh);
                    });
                    geometry.dispose();
                    renderer.dispose();
                };
            }, [cubeData, size]);

            return (
                <div className={`${className}`}>
                    <canvas
                        ref={canvasRef}
                        width={size}
                        height={size}
                        className="rounded-lg shadow-2xl cursor-grab bg-transparent"

                        Qrypto Trust Public Key Cube

                </div>
            );

        // ==================== CRYPTO UTILITIES ====================
        const cryptoUtils = {
            generateRandomBytes: (len) => {
                // Handle large arrays by generating in chunks (max 65536 per call)
                const arr = new Uint8Array(len);
                const chunk = 65536;
                for (let i = 0; i < len; i += chunk) {
                    const size = Math.min(chunk, len - i);
                    const temp = new Uint8Array(size);
                    window.crypto.getRandomValues(temp);
                    arr.set(temp, i);
                }
                return arr;
            },
            bytesToHex: (bytes) => Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join(''),
            hexToBytes: (hex) => {
                const bytes = new Uint8Array(hex.length / 2);
                for (let i = 0; i < hex.length; i += 2) bytes[i/2] = parseInt(hex.substr(i, 2), 16);
                return bytes;
            },
            bytesToBase64: (bytes) => {
                // Handle large arrays by processing in chunks
                const chunk = 8192;
                let result = '';
                for (let i = 0; i < bytes.length; i += chunk) {
                    const slice = bytes.subarray(i, i + chunk);
                    result += String.fromCharCode.apply(null, slice);
                }
                return btoa(result);
            },
            base64ToBytes: (b64) => {
                const binary = atob(b64);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) {
                    bytes[i] = binary.charCodeAt(i);
                }
                return bytes;
            },
            fingerprint: (key) => {
                const hash = new Uint8Array(32);
                for (let i = 0; i < 32; i++) hash[i] = key[i % key.length] ^ (i * 17);
                return cryptoUtils.bytesToHex(hash).match(/.{1,4}/g).slice(0, 8).join(' ').toUpperCase();

                encapsulate: (pk) => {
                    const result = noblePostQuantum.ml_kem768.encapsulate(pk);
                    // Normalise property name to lowercase 'ciphertext' for internal consistency
                    return { sharedSecret: result.sharedSecret, ciphertext: result.cipherText };

                decapsulate: (ct, sk) => noblePostQuantum.ml_kem768.decapsulate(ct, sk)

                sign: (msg, sk) => noblePostQuantum.ml_dsa65.sign(msg, sk),
                // Real API is verify(sig, msg, pk) — we adapt here so callers keep (msg, sig, pk) order

                    'raw', keyBytes, { name: 'AES-GCM' }, false, ['encrypt']

                const encryptedBuffer = await crypto.subtle.encrypt(
                    { name: 'AES-GCM', iv }, cryptoKey, data
                );
                return { iv, encrypted: new Uint8Array(encryptedBuffer) };
            },
            decrypt: async (encryptedBytes, keyBytes, iv) => {
                const cryptoKey = await crypto.subtle.importKey(
                    'raw', keyBytes, { name: 'AES-GCM' }, false, ['decrypt']
                );
                const decryptedBuffer = await crypto.subtle.decrypt(

                return new Uint8Array(decryptedBuffer);

                                if (typeof parsed.message === 'string') return parsed.message;

                        } catch (ignored) { }
                    }
                    return value;

                    if (typeof value.status === 'string') return value.status;
                    if (typeof value.message === 'string') return value.message;
                    try {
                        return JSON.stringify(value);
                    } catch (ignored) {
                        return String(value);
                    }

                if (value === null || typeof value === 'undefined') {
                    return 'Unknown error';

            const encryptAndSign = async () => {

                    await new Promise(r => setTimeout(r, 200));
                    
                    const payload = {

                    };
                    const payloadStr = JSON.stringify(payload);

                    // ML-KEM encapsulation

                    await new Promise(r => setTimeout(r, 400));

                    await new Promise(r => setTimeout(r, 300));

            const validateEncryptedPackageFormat = (pkg) => {
                const isObject = (value) => !!value && typeof value === 'object' && !Array.isArray(value);
                const isNonEmptyString = (value) => typeof value === 'string' && value.trim().length > 0;
                const isLikelyBase64 = (value) => {
                    if (!isNonEmptyString(value)) return false;
                    const normalized = value.trim();
                    return normalized.length % 4 === 0 && /^[A-Za-z0-9+/]+={0,2}$/.test(normalized);
                };

                if (!isObject(pkg)) {
                    throw new Error('Invalid encrypted package format: root object is missing.');
                }

                if (!isObject(pkg.sender)) {
                    throw new Error('Invalid encrypted package format: sender block is missing.');
                }

                if (!isNonEmptyString(pkg.sender.email) || !isNonEmptyString(pkg.sender.deviceId)) {
                    throw new Error('Invalid encrypted package format: sender must include email and deviceId.');
                }

                if (!isObject(pkg.algorithm) || !isNonEmptyString(pkg.algorithm.kem) || !isNonEmptyString(pkg.algorithm.sig) || !isNonEmptyString(pkg.algorithm.enc)) {
                    throw new Error('Invalid encrypted package format: algorithm block is incomplete.');
                }

                const encodedFields = ['kemCiphertext', 'iv', 'encryptedPayload', 'signature'];
                for (const field of encodedFields) {
                    if (!isLikelyBase64(pkg[field])) {
                        throw new Error(`Invalid encrypted package format: ${field} is missing or not valid base64.`);
                    }
                }
            };

            const resolveSenderKeyFromPackage = async (pkg) => {

                if (!senderEmail || !senderDeviceId) {

                                        signIn();
                                    }
                                }}
                                className="w-full bg-gray-50 text-gray-900 rounded-lg px-4 py-3 border border-gray-300 focus:border-blue-400 focus:outline-none"
                            />
                            <button
                                onClick={() => signIn()}
                                disabled={teamEmail.length === 0 || processing}
                                className="w-full bg-blue-600 hover:bg-blue-500 disabled:bg-gray-300 text-white py-3 rounded-lg font-semibold transition-colors"
                            >
                                {processing ? '⏳ Please Wait...' : 'Sign-In'}
                            </button>
                        </div>
                    ));
            }

            // Code Entry Phase
            if (phase === 'code') {
                return (
                    wrapContent(
                        <div className="space-y-4">
                            <h2 className="text-lg font-semibold text-gray-900">Enter Validation Code:</h2>
                            <p>
                                <text className="text-gray-900">A confirmation email was sent to you at <b>{teamEmail}</b>. Enter the PIN code you received below:</text>
                            </p>
                            <input
                                type="text"
                                placeholder="Enter Validation Code"
                                value={pin}
                                disabled={processing}
                                onChange={e => setPin(e.target.value)}
                                onKeyDown={e => {
                                    if (e.key === 'Enter' && pin.length >= 6 && !processing) {
                                        e.preventDefault();
                                        validateCode();
                                    }
                                }}
                                className="w-full bg-gray-50 text-gray-900 rounded-lg px-4 py-3 border border-gray-300 focus:border-blue-400 focus:outline-none"
                            />
                            <button
                                onClick={() => validateCode()}
                                disabled={pin.length < 6 || processing}
                                className="w-full bg-blue-600 hover:bg-blue-500 disabled:bg-gray-300 text-white py-3 rounded-lg font-semibold transition-colors"
                            >
                               Validate
                            </button>
                        </div>
                    ));
            }

            if (phase === 'identity') {
                const statusStyles = {
                    valid: 'bg-green-50 border border-green-400 text-green-700',
                    empty: 'bg-yellow-50 border border-yellow-400 text-yellow-700',
                    'missing-xq': 'bg-orange-50 border border-orange-400 text-orange-700',
                    'invalid-local': 'bg-red-50 border border-red-400 text-red-600',
                    mismatch: 'bg-red-50 border border-red-400 text-red-600',
                    unknown: 'bg-gray-50 border border-gray-300 text-gray-600'
                };

                return (
                    wrapContent(
                        <div className="space-y-4">
                            <h2 className="text-lg font-semibold text-gray-900">Keypair Management</h2>
                            <p className="text-gray-600">Signed in as <b>{teamEmail}</b> (Device ID: <b>{deviceId || 'Loading...'}</b>)</p>

                            <div className={`rounded-lg p-4 ${statusStyles[identityStatus.type] || statusStyles.unknown}`}>
                                <p className="font-semibold mb-1">Current Key Status</p>
                                <p>{identityStatus.message}</p>
                            </div>

                            <div className="grid md:grid-cols-2 gap-4">
                                <button
                                    onClick={refreshIdentityStatus}
                                    disabled={identityAction !== 'idle'}
                                    className="w-full bg-gray-200 hover:bg-gray-300 disabled:bg-gray-300 text-gray-900 py-3 rounded-lg font-semibold transition-colors"
                                >
                                    {identityAction === 'checking' ? '⏳ Checking...' : 'Check Current Key Status'}
                                </button>
                                <button
                                    onClick={generateAndStoreIdentity}
                                    disabled={identityAction !== 'idle'}
                                    className="w-full bg-blue-600 hover:bg-blue-500 disabled:bg-gray-300 text-white py-3 rounded-lg font-semibold transition-colors"
                                >
                                    {identityAction === 'generating' ? '⏳ Generating...' : 'Generate Keypair'}
                                </button>
                            </div>

                            <div className="grid md:grid-cols-2 gap-4">
                                <button
                                    onClick={exportLocalKeypair}
                                    disabled={identityAction !== 'idle'}
                                    className="w-full bg-indigo-600 hover:bg-indigo-500 disabled:bg-gray-300 text-white py-3 rounded-lg font-semibold transition-colors"
                                >
                                    Export Keypair
                                </button>
                                <button
                                    onClick={() => importKeysInputRef.current?.click()}
                                    disabled={identityAction !== 'idle'}
                                    className="w-full bg-purple-600 hover:bg-purple-500 disabled:bg-gray-300 text-white py-3 rounded-lg font-semibold transition-colors"
                                >
                                    {identityAction === 'importing' ? '⏳ Importing...' : 'Import Keypair'}
                                </button>
                                <input
                                    ref={importKeysInputRef}
                                    type="file"
                                    accept=".json"
                                    onChange={importLocalKeypair}
                                    className="hidden"
                                />
                            </div>

                            <button
                                onClick={deleteAllIdentityKeysInXQ}
                                disabled={identityAction !== 'idle'}
                                className="w-full bg-red-600 hover:bg-red-500 disabled:bg-gray-300 text-white py-3 rounded-lg font-semibold transition-colors"
                            >
                                {identityAction === 'deleting' ? '⏳ Deleting...' : 'Delete All My XQ Keys'}
                            </button>

                            <button
                                onClick={continueToApp}
                                disabled={identityAction !== 'idle' || identityStatus.type !== 'valid' || !myKeys}
                                className="w-full bg-green-600 hover:bg-green-500 disabled:bg-gray-300 text-white py-3 rounded-lg font-semibold transition-colors"
                            >
                                {identityAction === 'continuing' ? '⏳ Continuing...' : 'Continue'}
                            </button>
                        </div>
                    )
                );
            }

            // Ready Phase
            // Mode Selection Screen
            if (!mode) {
                return wrapContent(
                    <div className="space-y-4">
                        <div className="grid md:grid-cols-2 gap-6">
                            <button
                                onClick={() => setMode('send')}
                                className="bg-gradient-to-br from-blue-600 to-blue-800 p-8 rounded-xl hover:from-blue-500 hover:to-blue-700 transition-all transform hover:scale-105 shadow-xl"
                            >
                                <div className="text-6xl mb-4">📤</div>
                                <div className="text-xl font-bold text-white">Send Secure File Transfer</div>
                                <div className="text-blue-200 text-sm mt-2">Encrypt & sign a message</div>
                            </button>

                            <button
                                onClick={() => setMode('receive')}
                                className="bg-gradient-to-br from-green-600 to-green-800 p-8 rounded-xl hover:from-green-500 hover:to-green-700 transition-all transform hover:scale-105 shadow-xl"
                            >
                                <div className="text-6xl mb-4">📥</div>
                                <div className="text-xl font-bold text-white">Receive Secure File Transfer</div>
                                <div className="text-green-200 text-sm mt-2">Verify & decrypt a message</div>
                            </button>
                        </div>

                        <div className="grid md:grid-cols-2 gap-6">
                            <button
                                onClick={goToKeyManagement}
                                className="w-full bg-gray-200 hover:bg-gray-300 text-gray-900 py-3 rounded-lg font-semibold transition-colors"
                            >
                                🔑 Go to Keypair Management
                            </button>
                            <button
                                onClick={logout}
                                className="w-full bg-red-600 hover:bg-red-500 text-white py-3 rounded-lg font-semibold transition-colors"
                            >
                                Logout
                            </button>
                        </div>
                    </div>
                )
            }

            const totalSteps = mode === 'receive' ? 2 : 3;
            const progressSteps = Array.from({ length: totalSteps }, (_, i) => i);

            return (
                <div className="min-h-screen p-4">
                    {showLattice && (
                        <div className="lattice-container">
                            <LatticeCube size={200} colorBytes={latticeColorBytes} seedEmail={latticeSeedEmail} />
                        </div>
                    )}
                    <div className="max-w-4xl mx-auto main-content">
                        {/* Header */}
                        <div className="flex items-center justify-between mb-6">
                            <div>
                                <h1 className="text-2xl font-bold text-gray-900">
                                    {mode === 'send' ? '📤 Send Secure File Transfer' : '📥 Receive Secure File Transfer'}
                                </h1>
                                <p className="text-gray-500 text-sm">Step {step + 1} of {totalSteps}</p>
                                <p className="text-green-700 text-xs mt-1">✅ Key Status: {identityStatus.type === 'valid' ? 'Valid' : 'Check Required'}</p>
                            </div>
                            <button onClick={reset} className="text-gray-500 hover:text-gray-900 text-sm">
                                ← Back to Start
                            </button>

                            <button onClick={logout} className="text-gray-500 hover:text-gray-900 text-sm">
                                Logout
                            </button>
                        </div>

                        {/* Progress Bar */}
                        <div className="flex gap-2 mb-6">
                            {progressSteps.map(i => (
                                <div key={i} className={`h-2 flex-1 rounded ${i <= step ? 'bg-blue-500' : 'bg-gray-200'}`} />
                            ))}
                        </div>

                        <div className="grid lg:grid-cols-3 gap-6">
                            {/* Main Content */}
                            <div className="lg:col-span-2 bg-white/80 rounded-xl p-6 backdrop-blur">
                                {/* SEND MODE */}
                                {mode === 'send' && (
                                    <>

                                        {step === 0 && (
                                            <div className="space-y-4">
                                                <h2 className="text-lg font-semibold text-gray-900">Sending as {teamEmail}</h2>
                                                <div className="bg-gray-50 rounded-lg p-4">
                                                    <p className="text-gray-600 mb-2">Your fingerprint:</p>
                                                    <code className="text-green-700 font-mono text-sm">
                                                        {cryptoUtils.fingerprint(myKeys.dilithium.publicKey)}
                                                    </code>
                                                    <p className="text-gray-500 mt-2 text-sm">Device ID: {deviceId}</p>
                                                </div>
                                                <div className="border-t border-gray-300 pt-4">
                                                    <p className="text-gray-500 mb-2">Select a Message Recipient:</p>
                                                    <select
                                                        onClick={() => refreshTeamMembers({ withProcessing: false, logMessage: false })}
                                                        onChange={e => setSelectedMember(e.target.value)}
                                                        className="w-full text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-blue-600 hover:file:bg-blue-500"
                                                    >
                                                        <option key="empty" value="empty">None Selected</option>
                                                        {teamMembers.map(member => (
                                                            <option key={member.token} value={member.token}>{member.email}{member.deviceId ? ` (${member.deviceId})` : ''} (Updated {formatDateTime(member.updated)})</option>
                                                        ))}
                                                    </select>
                                                    <button
                                                        onClick={loadSelectedMemberKeys}
                                                        disabled={!selectedMember || selectedMember === 'empty' || processing}
                                                        className="w-full bg-blue-600 hover:bg-blue-500 disabled:bg-gray-300 text-white py-3 rounded-lg font-semibold transition-colors"
                                                    >
                                                        Use Selected Recipient
                                                    </button>
                                                </div>
                                            </div>
                                        )}

                                        {step === 1 && (
                                            <div className="space-y-4">
                                                <h2 className="text-lg font-semibold text-gray-900">Compose Message</h2>
                                                <div className="bg-gray-50 rounded-lg p-3">
                                                    <span className="text-gray-500">To: </span>
                                                    <span className="text-gray-900">{recipientName}</span>
                                                    <span className="text-gray-400 text-xs ml-2">
                                                        ({recipientPubKey.fingerprint})
                                                    </span>
                                                </div>
                                                <input
                                                    type="text"
                                                    placeholder="Subject"
                                                    value={subject}
                                                    onChange={e => setSubject(e.target.value)}
                                                    className="w-full bg-gray-50 text-gray-900 rounded-lg px-4 py-3 border border-gray-300 focus:border-blue-400 focus:outline-none"
                                                />
                                                <textarea
                                                    placeholder="Message body..."
                                                    value={message}
                                                    onChange={e => setMessage(e.target.value)}
                                                    rows={5}
                                                    className="w-full bg-gray-50 text-gray-900 rounded-lg px-4 py-3 border border-gray-300 focus:border-blue-400 focus:outline-none resize-none"
                                                />
                                                <div>
                                                    <input
                                                        type="file"
                                                        multiple
                                                        onChange={handleFileAttachment}
                                                        className="w-full text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-gray-200 file:text-gray-900 hover:file:bg-gray-300"
                                                    />
                                                    {attachments.length > 0 && (
                                                        <div className="mt-2 space-y-1">
                                                            {attachments.map((a, i) => (
                                                                <div key={i} className="text-sm text-gray-500">
                                                                    📎 {a.name} ({(a.size / 1024).toFixed(1)} KB)
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                                <button
                                                    onClick={encryptAndSign}
                                                    disabled={!subject || !message || processing}
                                                    className="w-full bg-blue-600 hover:bg-blue-500 disabled:bg-gray-300 text-white py-3 rounded-lg font-semibold"
                                                >
                                                    {processing ? '⏳ Encrypting...' : '🔒 Encrypt & Sign'}
                                                </button>
                                            </div>
                                        )}

                                        {step === 2 && encryptedPackage && (
                                            <div className="space-y-4">
                                                <h2 className="text-lg font-semibold text-gray-900">✅ File Transfer Encrypted!</h2>
                                                <div className="bg-green-50 border border-green-400 rounded-lg p-4">
                                                    <p className="text-green-700">Your message has been encrypted and signed.</p>
                                                    <p className="text-green-700 text-sm mt-2">
                                                        Download the .pqc.json file and send it to {recipientName} via any channel.
                                                    </p>
                                                </div>
                                                <button
                                                    onClick={downloadPackage}
                                                    className="w-full bg-green-600 hover:bg-green-500 text-white py-3 rounded-lg font-semibold"
                                                >
                                                    📥 Download Encrypted Package
                                                </button>
                                            </div>
                                        )}
                                    </>
                                )}

                                {/* RECEIVE MODE */}
                                {mode === 'receive' && (
                                    <>

                                        {step === 0 && (
                                            <div className="space-y-4">
                                                <h2 className="text-lg font-semibold text-gray-900">Load & Decrypt</h2>
                                                <div className="bg-gray-50 rounded-lg p-4 mb-4">
                                                    <p className="text-gray-600 mb-2">Your fingerprint:</p>
                                                    <code className="text-green-700 font-mono text-sm">
                                                        {cryptoUtils.fingerprint(myKeys.dilithium.publicKey)}
                                                    </code>
                                                    <p className="text-gray-500 mt-2 text-sm">Device ID: {deviceId}</p>
                                                </div>

                                                <div className="border-t border-gray-300 pt-4">
                                                    {!receivedPackage ? (
                                                        <>
                                                            <p className="text-gray-500 mb-2">Load encrypted file transfer (.pqc.json):</p>
                                                            <input
                                                                type="file"
                                                                accept=".json"
                                                                onChange={loadReceivedPackage}
                                                                className="w-full text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-green-600 file:text-white hover:file:bg-green-500"
                                                            />
                                                            <p className="text-gray-400 text-xs mt-2">
                                                                Sender key is resolved automatically from packet sender + device ID.
                                                            </p>
                                                            {senderKeyLookupError && (
                                                                <p className="text-red-600 text-xs mt-2">{senderKeyLookupError}</p>
                                                            )}
                                                        </>
                                                    ) : (
                                                        <div className="space-y-4">
                                                            <div className="bg-gray-50 rounded-lg p-4">
                                                                <p className="text-gray-500">From: <span className="text-gray-900">{receivedPackage.sender.email} ({receivedPackage.sender.deviceId})</span></p>
                                                                <p className="text-gray-400 text-xs">{receivedPackage.sender.fingerprint}</p>
                                                                <p className="text-gray-400 text-xs mt-1">Resolved sender key: {recipientName || 'Not found'}</p>
                                                                {senderKeyLookupError && (
                                                                    <p className="text-red-600 text-xs mt-1">{senderKeyLookupError}</p>
                                                                )}
                                                            </div>
                                                            <button
                                                                onClick={verifyAndDecrypt}
                                                                disabled={processing || !prefetchedSenderPublicKey}
                                                                className="w-full bg-green-600 hover:bg-green-500 disabled:bg-gray-300 text-white py-3 rounded-lg font-semibold"
                                                            >
                                                                {decrypting ? '⏳ Decrypting...' : (processing ? '⏳ Preparing...' : '🔓 Verify & Decrypt')}
                                                            </button>
                                                            {decryptErrorMessage && (
                                                                <p className="text-red-600 text-xs mt-2">{decryptErrorMessage}</p>
                                                            )}
                                                        </div>
                                                    )}
                                                </div>

                                            </div>
                                        )}

                                        {step === 1 && decryptedData && (
                                            <div className="space-y-4">
                                                <h2 className="text-lg font-semibold text-gray-900">✅ Message Decrypted!</h2>
                                                <div className="bg-gray-50 rounded-lg p-4">
                                                    <p className="text-gray-500 text-sm">Subject:</p>
                                                    <p className="text-gray-900 font-semibold">{decryptedData.subject}</p>
                                                </div>
                                                <div className="bg-gray-50 rounded-lg p-4">
                                                    <p className="text-gray-500 text-sm">Message:</p>
                                                    <p className="text-gray-900 whitespace-pre-wrap">{decryptedData.body}</p>
                                                </div>
                                                {decryptedData.attachments?.length > 0 && (
                                                    <div className="bg-gray-50 rounded-lg p-4">
                                                        <p className="text-gray-500 text-sm mb-2">Attachments:</p>
                                                        {decryptedData.attachments.map((a, i) => (
                                                            <div key={i} className="flex items-center justify-between py-2">
                                                                <span className="text-gray-900">📎 {a.name}</span>
                                                                <button
                                                                    onClick={() => {
                                                                        const data = cryptoUtils.base64ToBytes(a.data);
                                                                        const blob = new Blob([data], { type: a.type });
                                                                        const url = URL.createObjectURL(blob);
                                                                        const link = document.createElement('a');
                                                                        link.href = url;
                                                                        link.download = a.name;
                                                                        link.click();
                                                                    }}
                                                                    className="text-blue-600 hover:text-blue-500 text-sm"
                                                                >
                                                                    ⬇️ Download
                                                                </button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </>
                                )}
                            </div>

                            {/* Log Panel */}
                            <div className="bg-gray-50 rounded-xl p-4 h-fit max-h-96 overflow-y-auto">
                                <h3 className="text-gray-500 text-sm font-semibold mb-3">📋 Operation Log</h3>
                                <div className="space-y-2 font-mono text-xs">
                                    {logs.length === 0 ? (
                                        <p className="text-gray-400">Waiting for operations...</p>
                                    ) : (
                                        logs.map((log, i) => (
                                            <div key={i} className={`${
                                                log.type === 'success' ? 'text-green-700' :
                                                log.type === 'error' ? 'text-red-600' :
                                                log.type === 'process' ? 'text-yellow-600' : 'text-gray-500'
                                            }`}>
                                                <span className="text-gray-400">[{log.time}]</span> {log.msg}
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Footer */}
                        <div className="mt-6 text-center text-gray-400 text-xs">
                            PQC Secure File Transfer Demo | FIPS 203 (ML-KEM-768) + FIPS 204 (ML-DSA-65) | Simulation for demonstration purposes
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<PQCEmailDemo />, document.getElementById('root'));
    </script>
</body>
</html>
