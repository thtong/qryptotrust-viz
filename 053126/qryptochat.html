                                                    var ztSuffix = '';
                                                    if (done.ztStatus) {
                                                        dotPrefix = done.ztStatus.dot + ' ';
                                                        ztSuffix = ' | ' + done.ztStatus.color.toUpperCase() + ' — inner=' + (done.ztStatus.inner_algo || 'unknown');
                                                    }
                                                    text = dotPrefix + '📥 ' + done.fileName + ' — saved to Downloads (' + done.fileSize + 'B, SHA-256 verified)' + ztSuffix;
                                                    sender = 'sft';
                                                    verified = true;
                                                } catch(de) {
                                                    text = '[📎 SFT complete — finalize failed: ' + de.message + ']';
                                                }
                                            } else if (parsed.text) {
                                                text = parsed.text;
                                                if (parsed.sender) sender = parsed.sender;
                                                if (parsed.senderDevice) device = parsed.senderDevice;
                                            }
                                        } catch(e) {}
                                        appendChatMsg('in', text, sender, device, new Date(m.timestamp).toLocaleTimeString());
                                    }
                                }
                            } catch(e) {}
                        };
                        xhr.send();
                    }, 2000);
                }

                // A3: Browse Agents — fetch /api/hooks/list, filter has_chat_pk=true,
                // sort by last_fired_at desc so freshest agents float to the top.
                const loadAgents = async function() {
                    setAgentLoading(true);
                    setAgentError('');
                    try {
                        var resp = await fetch('/api/hooks/list');
                        var data = await resp.json();
                        if (data.status !== 'ok' || !Array.isArray(data.hooks)) {
                            throw new Error('list endpoint returned no hooks');
                        }
                        var chatable = data.hooks
                            .filter(function(h) { return h.has_chat_pk === true; })
                            .sort(function(a, b) {
                                var at = a.last_fired_at || a.registered_at || '';
                                var bt = b.last_fired_at || b.registered_at || '';
                                return bt.localeCompare(at);
                            });
                        setAgentList(chatable);
                        setShowAgents(true);
                    } catch (e) {
                        setAgentError(e.message || String(e));
                        setAgentList([]);
                        setShowAgents(true);
                    } finally {
                        setAgentLoading(false);
                    }
                };

                // A3: Select an agent → fetch its chat KEM pk → install recipientPubKey with
                // .participant block populated so doSendChat auto-emits v=2.1p.
                const selectAgent = async function(hook) {
                    setProcessing(true);
                    try {
                        var resp = await fetch('/api/hooks/' + encodeURIComponent(hook.hook_id) + '/chat_pk');
                        var data = await resp.json();
                        if (data.status !== 'ok' || !data.kem_pk_b64) {
                            throw new Error(data.reason || 'chat_pk fetch failed');
                        }
                        var kemPk = cryptoUtils.base64ToBytes(data.kem_pk_b64);
                        // The agent's "fingerprint" for the chat envelope is the SHA-256/8B of its
                        // chat KEM pk — same convention as cryptoUtils.fingerprint() for any pk.
                        var fp = cryptoUtils.fingerprint(kemPk);
                        var displayName = hook.agent_id ? (hook.agent_id + (hook.program_id ? '@' + hook.program_id : '')) : ('agent:' + hook.hook_id.slice(0,8));
                        setRecipientName(displayName);
                        setRecipientPubKey({
                            name: displayName,
                            fingerprint: fp,
                            kyberPublicKey: kemPk,
                            // A3: tell doSendChat to emit v=2.1p with this participant block.
                            // participant_type='agent' is the default for picker selections;
                            // 'service' picks come from a future tab (Phase D).
                            participant: {
                                participant_type: 'agent',
                                agent_id: hook.agent_id || '',
                                program_id: hook.program_id || ''
                            },
                            // Bookkeeping so the chat header can show hook context
                            hook_id: hook.hook_id
                        });
                        setShowAgents(false);
                        addLog('Agent selected: ' + displayName + ' (kem_fp=' + fp + ')', 'info');
                    } catch (e) {
                        setAgentError('Agent select failed: ' + (e.message || String(e)));
                    } finally {
                        setProcessing(false);
                    }
                };

                // Send chat message — E2E encrypted via SFT pipeline
                const doSendChat = async function() {
                    var inp = document.getElementById('chatMsgInput');
                    if (!inp) return;
                    var text = inp.value.trim();
                    if (!text) return;
                    inp.value = '';

                    // Show plaintext locally immediately
                    appendChatMsg('out', text, teamEmail, deviceId, new Date().toLocaleTimeString());

                    if (!recipientPubKey || !recipientPubKey.kyberPublicKey) {
                        addLog('No recipient verified — cannot encrypt', 'error');
                        return;
                    }
                    if (!myKeys || !myKeys.dilithium || !myKeys.dilithium.secretKey) {
                        addLog('No signing key available', 'error');
                        return;
                    }

                    try {
                        // Get recipient KEM public key as Uint8Array
                        var rcpKemPk = recipientPubKey.kyberPublicKey instanceof Uint8Array
                            ? recipientPubKey.kyberPublicKey
                            : cryptoUtils.base64ToBytes(recipientPubKey.kyberPublicKey);

                        // Detect KEM/DSA suite from recipient key size
                        var kemImpl = (rcpKemPk.length === 1568) ? noblePostQuantum.ml_kem1024
                            : (rcpKemPk.length === 800) ? noblePostQuantum.ml_kem512
                            : noblePostQuantum.ml_kem768;
                        var dsaSk = myKeys.dilithium.secretKey;
                        var dsaImpl = (dsaSk.length === 4896) ? noblePostQuantum.ml_dsa87
                            : (dsaSk.length === 2560) ? noblePostQuantum.ml_dsa44
                            : noblePostQuantum.ml_dsa65;

                        // Step 1: KEM encapsulate to recipient
                        var encResult = kemImpl.encapsulate(rcpKemPk);
                        var sharedSecret = encResult.sharedSecret;
                        var kemCt = encResult.cipherText;

                        // v2.1: A5 anti-replay nonce, generated once, embedded in payload
                        var nonceB64 = cryptoUtils.bytesToBase64(crypto.getRandomValues(new Uint8Array(16)));
                        var tsNow = new Date().toISOString();

                        // Step 2: AES-256-GCM encrypt the message payload (nonce inside = MAC-protected)
                        var payload = JSON.stringify({
                            type: 'chat',
                            text: text,
                            sender: teamEmail,
                            senderDevice: deviceId,
                            recipient: recipientName,
                            nonce: nonceB64,
                            ts: tsNow
                        });
                        var payloadBytes = new TextEncoder().encode(payload);
                        var aesResult = await aes.encrypt(payloadBytes, sharedSecret);

                        var kemCtB64 = cryptoUtils.bytesToBase64(kemCt);
                        var ivB64 = cryptoUtils.bytesToBase64(aesResult.iv);
                        var encB64 = cryptoUtils.bytesToBase64(aesResult.encrypted);
                        var senderDsaPkB64 = cryptoUtils.bytesToBase64(myKeys.dilithium.publicKey);
                        var senderFp = cryptoUtils.fingerprint(myKeys.dilithium.publicKey);

                        // Step 3 (A8): ML-DSA sign SHA-256 digest of full canonical envelope.
                        // Emit v=2.1p when the recipient carries explicit participant info
                        // (e.g. from the Browse-Agents picker). Otherwise emit legacy v=2.1.
                        var recipientParticipant = _normalizeParticipant(recipientPubKey.participant);
                        var emitV21p = recipientParticipant !== null;
                        var senderParticipant = _resolveSenderParticipant();
                        var versionTag = emitV21p ? '2.1p' : '2.1';

                        var canonicalStr;
                        if (emitV21p) {
                            canonicalStr = _chatCanonical([
                                ['v', versionTag],
                                ['senderFp', senderFp],
                                ['senderDsaPk', senderDsaPkB64],
                                [':raw', 'sender_participant', _participantCanonical(senderParticipant)],
                                ['recipientFp', recipientPubKey.fingerprint],
                                [':raw', 'recipient_participant', _participantCanonical(recipientParticipant)],
                                ['kemCt', kemCtB64],
                                ['iv', ivB64],
                                ['enc', encB64],
                                ['ts', tsNow]
                            ]);
                        } else {
                            canonicalStr = JSON.stringify({
                                v: versionTag,
                                senderFp: senderFp,
                                senderDsaPk: senderDsaPkB64,
                                recipientFp: recipientPubKey.fingerprint,
                                kemCt: kemCtB64,
                                iv: ivB64,
                                enc: encB64,
                                ts: tsNow
                            });
                        }
                        var digestBuf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(canonicalStr));
                        var sig = dsaImpl.sign(new Uint8Array(digestBuf), dsaSk);

                        // Step 4: Build encrypted package (carry participant blocks on the wire
                        // so receivers can reconstruct the same canonical for verify).
                        var senderBlock = {
                            name: teamEmail,
                            device: deviceId,
                            dsaPk: senderDsaPkB64,
                            fingerprint: senderFp
                        };
                        var recipientBlock = {
                            name: recipientName,
                            fingerprint: recipientPubKey.fingerprint
                        };
                        if (emitV21p) {
                            senderBlock.participant = senderParticipant;
                            recipientBlock.participant = recipientParticipant;
                        }
                        var pkg = {
                            type: 'qrypto_chat_encrypted',
                            v: versionTag,
                            sender: senderBlock,
                            recipient: recipientBlock,
                            kemCt: kemCtB64,
                            iv: ivB64,
                            enc: encB64,
                            sig: cryptoUtils.bytesToBase64(sig),
                            ts: tsNow
                        };

                        // Step 5: Send via tunnel (DadPad/ChatStream see encrypted JSON, can't decrypt)
                        var xhr = new XMLHttpRequest();
                        xhr.open('POST', '/api/tunnel/tcp/send', true);
                        xhr.setRequestHeader('Content-Type', 'application/json');
                        xhr.onload = function() {
                            try {
                                var d = JSON.parse(xhr.responseText);
                                if (d.status !== 'ok') addLog('Send failed: ' + (d.reason || 'error'), 'error');
                            } catch(e) { addLog('Send error', 'error'); }
                        };
                        xhr.onerror = function() { addLog('Network error', 'error'); };
                        xhr.send(JSON.stringify({plaintext: JSON.stringify(pkg)}));
                    } catch(e) {
                        addLog('Encryption failed: ' + e.message, 'error');
                    }
                };

                // SFT v2.1 in-chat attachment send.
                // Encrypts a File under the same chat keypair that drives messages —
                // one ML-KEM-768 encap + one ML-DSA-65 sig per file.
                const doSendChatAttachment = async function(file, recipientOverride, metaOverride) {
                    var recipient = recipientOverride || recipientPubKey;
                    if (!file) throw new Error('no file');
                    if (!recipient || !recipient.kyberPublicKey || !recipient.fingerprint) {
                        addLog('No recipient verified — cannot send attachment', 'error');
                        throw new Error('no recipient');
                    }
                    if (!myKeys || !myKeys.dilithium || !myKeys.dilithium.secretKey) {
                        throw new Error('no signing key');
                    }
                    // v2.1m meta block: pulled from window.zt_identity if present (set by future loader),
                    // overridable per-call via metaOverride. If absent, codec emits v=2.1 (legacy).
                    var meta = metaOverride || window.zt_identity || null;
                    if (meta && !meta.send_ts) meta.send_ts = new Date().toISOString();
                    if (meta && !meta.zt_v) meta.zt_v = '1';

                    var rkem = recipient.kyberPublicKey instanceof Uint8Array
                        ? recipient.kyberPublicKey
                        : cryptoUtils.base64ToBytes(recipient.kyberPublicKey);
                    var dsaSk = myKeys.dilithium.secretKey;
                    var kemImpl = (rkem.length === 1568) ? noblePostQuantum.ml_kem1024
                        : (rkem.length === 800) ? noblePostQuantum.ml_kem512
                        : noblePostQuantum.ml_kem768;
                    var dsaImpl = (dsaSk.length === 4896) ? noblePostQuantum.ml_dsa87
                        : (dsaSk.length === 2560) ? noblePostQuantum.ml_dsa44
                        : noblePostQuantum.ml_dsa65;

                    // 1. Read file
                    var buf = new Uint8Array(await file.arrayBuffer());
                    var shaBuf = await crypto.subtle.digest('SHA-256', buf);
                    var fileSha256 = new Uint8Array(shaBuf);

                    // 2. Session metadata
                    var sessionId = crypto.getRandomValues(new Uint8Array(16));
                    var ivBase = crypto.getRandomValues(new Uint8Array(8));
                    var chunkSize = 65536;
                    var chunkCount = Math.max(1, Math.ceil(buf.length / chunkSize));
                    var ts = new Date().toISOString();

                    // 3. KEM encap to recipient → SS = AES key for all chunks
                    var encResult = kemImpl.encapsulate(rkem);
                    var SS = encResult.sharedSecret;
                    var kemCt = encResult.cipherText;

                    // 4. Build canonical opener fields, sign with sender DSA sk
                    var senderDsaPkB64 = cryptoUtils.bytesToBase64(myKeys.dilithium.publicKey);
                    var senderFp = cryptoUtils.fingerprint(myKeys.dilithium.publicKey);
                    var sessionIdB64 = cryptoUtils.bytesToBase64(sessionId);

                    var version = meta ? '2.1m' : '2.1';
                    var openerForCanonical = {
                        v: version,
                        session_id: sessionIdB64,
                        senderFp: senderFp,
                        senderDsaPk: senderDsaPkB64,
                        recipientFp: recipient.fingerprint || '',
                        meta: meta || undefined,
                        fileName: file.name,
                        fileSize: buf.length,
                        fileSha256: cryptoUtils.bytesToBase64(fileSha256),
                        chunkSize: chunkSize,
                        chunkCount: chunkCount,
                        kemCt: cryptoUtils.bytesToBase64(kemCt),
                        iv_base: cryptoUtils.bytesToBase64(ivBase),
                        aes_suite: 'AES-256-GCM',
                        kem_suite: 'ML-KEM-768',
                        sig_suite: 'ML-DSA-65',
                        ts: ts
                    };
                    var canonical = _sftCanonicalOpener(openerForCanonical);
                    var digestBuf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(canonical));
                    var sig = dsaImpl.sign(new Uint8Array(digestBuf), dsaSk);

                    var opener = {
                        type: 'sft_opener',
                        v: version,
                        session_id: sessionIdB64,
                        senderFp: senderFp,
                        senderDsaPk: senderDsaPkB64,
                        recipientFp: recipient.fingerprint || '',
                        fileName: file.name,
                        fileSize: buf.length,
                        fileSha256: cryptoUtils.bytesToBase64(fileSha256),
                        chunkSize: chunkSize,
                        chunkCount: chunkCount,
                        kemCt: cryptoUtils.bytesToBase64(kemCt),
                        iv_base: cryptoUtils.bytesToBase64(ivBase),
                        aes_suite: 'AES-256-GCM',
                        kem_suite: 'ML-KEM-768',
                        sig_suite: 'ML-DSA-65',
                        ts: ts,
                        sig: cryptoUtils.bytesToBase64(sig)
                    };
                    if (meta) opener.meta = meta;

                    addLog('SFT v2.1 send: ' + file.name + ' (' + buf.length + 'B, ' + chunkCount + ' chunks) → ' + (recipient.name || recipient.fingerprint), 'info');
                    appendChatMsg('out', '📎 ' + file.name + ' — sending (PQC encrypted, sig signed)…', teamEmail, deviceId, new Date().toLocaleTimeString());

                    // 5. Send opener
                    await _sftTunnelSend(JSON.stringify(opener));

                    // 6. Optional chat-visible announce line (Laptop convention)
                    var announce = '📎 FILE TRANSFER (SFT v2.1) | ' + file.name + ' | ML-KEM-768 + ML-DSA-65 + AES-256-GCM | from ' + teamEmail + ' | session=' + sessionIdB64.slice(0, 12) + ' | saving to recipient Downloads';
                    await _sftTunnelSend(announce);

                    // 7. Send chunks
                    var aesKey = await crypto.subtle.importKey('raw', SS, { name: 'AES-GCM' }, false, ['encrypt']);
                    for (var seq = 0; seq < chunkCount; seq++) {
                        var start = seq * chunkSize;
                        var end = Math.min(start + chunkSize, buf.length);
                        var chunkPt = buf.slice(start, end);

                        var iv = new Uint8Array(12);
                        iv.set(ivBase, 0);
                        new DataView(iv.buffer).setUint32(8, seq, false);

                        var aad = new Uint8Array(20);
                        aad.set(sessionId, 0);
                        new DataView(aad.buffer).setUint32(16, seq, false);

                        var ctBuf = await crypto.subtle.encrypt(
                            { name: 'AES-GCM', iv: iv, additionalData: aad },
                            aesKey, chunkPt
                        );
                        var chunkMsg = {
                            type: 'sft_chunk',
                            session_id: sessionIdB64,
                            seq: seq,
                            ct: cryptoUtils.bytesToBase64(new Uint8Array(ctBuf))
                        };
                        await _sftTunnelSend(JSON.stringify(chunkMsg));
                    }

                    // 8. Send completion marker
                    await _sftTunnelSend(JSON.stringify({
                        type: 'sft_complete',
                        session_id: sessionIdB64,
                        fileName: file.name
                    }));

                    appendChatMsg('out', '📎 ' + file.name + ' — sent (' + buf.length + 'B, ' + chunkCount + ' chunk' + (chunkCount === 1 ? '' : 's') + ', SHA-256 in opener)', teamEmail, deviceId, new Date().toLocaleTimeString());
                    return { sessionId: sessionIdB64, chunkCount: chunkCount, fileSize: buf.length };
                };

                async function _sftTunnelSend(plaintext) {
                    return new Promise(function(resolve, reject) {
                        var xhr = new XMLHttpRequest();
                        xhr.open('POST', '/api/tunnel/tcp/send', true);
                        xhr.setRequestHeader('Content-Type', 'application/json');
                        xhr.onload = function() {
                            try {
                                var d = JSON.parse(xhr.responseText);
                                if (d.status === 'ok') resolve(d); else reject(new Error(d.reason || 'send error'));
                            } catch(e) { reject(e); }
                        };
                        xhr.onerror = function() { reject(new Error('network error')); };
                        xhr.send(JSON.stringify({plaintext: plaintext}));
                    });
                }

                window.doSendChatAttachment = doSendChatAttachment;

                // v2.1g group send: one AES-GCM body under random CEK,
                // per-recipient (kemCt_i, wrap_i) where wrap_i = CEK XOR KEM.decap output.
                // recipients: [{name, fingerprint, kyberPublicKey: Uint8Array|base64}, ...]
                const doSendChatGroup = async function(text, recipients) {
                    if (!text || typeof text !== 'string' || !text.trim()) throw new Error('empty text');
                    if (!Array.isArray(recipients) || recipients.length === 0) throw new Error('no recipients');
                    if (!myKeys || !myKeys.dilithium || !myKeys.dilithium.secretKey) throw new Error('no signing key');

                    var dsaSk = myKeys.dilithium.secretKey;
                    var dsaImpl = (dsaSk.length === 4896) ? noblePostQuantum.ml_dsa87
                        : (dsaSk.length === 2560) ? noblePostQuantum.ml_dsa44
                        : noblePostQuantum.ml_dsa65;

                    // 1. Random content-encryption key
                    var cek = crypto.getRandomValues(new Uint8Array(32));

                    // 2. For each recipient: KEM encap -> XOR-wrap CEK.
                    //    If any recipient carries .participant, we emit v=2.1gp and ALL recipients
                    //    must carry one (caller fills with {human,'',''} for unclassified).
                    var anyParticipantTyped = recipients.some(function(r) { return r.participant != null; });
                    var recipientsOut = [];
                    for (var i = 0; i < recipients.length; i++) {
                        var r = recipients[i];
                        var rkem = r.kyberPublicKey instanceof Uint8Array
                            ? r.kyberPublicKey
                            : cryptoUtils.base64ToBytes(r.kyberPublicKey);
                        var kemImpl = (rkem.length === 1568) ? noblePostQuantum.ml_kem1024
                            : (rkem.length === 800) ? noblePostQuantum.ml_kem512
                            : noblePostQuantum.ml_kem768;
                        var er = kemImpl.encapsulate(rkem);
                        var ephSs = er.sharedSecret;
                        var kemCt = er.cipherText;
                        if (ephSs.length !== 32) throw new Error('unexpected SS length from encap');
                        var wrap = new Uint8Array(32);
                        for (var b = 0; b < 32; b++) wrap[b] = cek[b] ^ ephSs[b];
                        var entry = {
                            name: r.name || null,
                            fingerprint: r.fingerprint,
                            kemCt: cryptoUtils.bytesToBase64(kemCt),
                            wrap: cryptoUtils.bytesToBase64(wrap)
                        };
                        if (anyParticipantTyped) {
                            entry.participant = _normalizeParticipant(r.participant) ||
                                { participant_type: 'human', agent_id: '', program_id: '' };
                        }
                        recipientsOut.push(entry);
                    }

                    // 3. AES-256-GCM encrypt payload with CEK
                    var nonceB64 = cryptoUtils.bytesToBase64(crypto.getRandomValues(new Uint8Array(16)));
                    var tsNow = new Date().toISOString();
                    var payload = JSON.stringify({
                        type: 'chat',
                        text: text,
                        sender: teamEmail,
                        senderDevice: deviceId,
                        nonce: nonceB64,
                        ts: tsNow
                    });
                    var payloadBytes = new TextEncoder().encode(payload);
                    var aesResult = await aes.encrypt(payloadBytes, cek);
                    var ivB64 = cryptoUtils.bytesToBase64(aesResult.iv);
                    var encB64 = cryptoUtils.bytesToBase64(aesResult.encrypted);

                    var senderDsaPkB64 = cryptoUtils.bytesToBase64(myKeys.dilithium.publicKey);
                    var senderFp = cryptoUtils.fingerprint(myKeys.dilithium.publicKey);

                    // 4. A8: sign SHA-256 digest of canonical envelope including ALL recipients.
                    //    v=2.1gp uses ordered-tuple canonical with raw participant blocks;
                    //    v=2.1g  uses the legacy plain-object canonical.
                    var groupVersionTag = anyParticipantTyped ? '2.1gp' : '2.1g';
                    var senderParticipantG = anyParticipantTyped ? _resolveSenderParticipant() : null;

                    var canonicalStr;
                    if (anyParticipantTyped) {
                        var recipientsCanonicalRaw = recipientsOut.map(function(r) {
                            return _chatCanonical([
                                ['fingerprint', r.fingerprint],
                                ['kemCt', r.kemCt],
                                ['wrap', r.wrap],
                                [':raw', 'participant', _participantCanonical(r.participant)]
                            ]);
                        });
                        var recipientsArrayJoined = '[' + recipientsCanonicalRaw.join(',') + ']';
                        canonicalStr = _chatCanonical([
                            ['v', groupVersionTag],
                            ['senderFp', senderFp],
                            ['senderDsaPk', senderDsaPkB64],
                            [':raw', 'sender_participant', _participantCanonical(senderParticipantG)],
                            [':raw', 'recipients', recipientsArrayJoined],
                            ['iv', ivB64],
                            ['enc', encB64],
                            ['ts', tsNow]
                        ]);
                    } else {
                        var recipientsCanonical = recipientsOut.map(function(r) {
                            return { fingerprint: r.fingerprint, kemCt: r.kemCt, wrap: r.wrap };
                        });
                        canonicalStr = JSON.stringify({
                            v: groupVersionTag,
                            senderFp: senderFp,
                            senderDsaPk: senderDsaPkB64,
                            recipients: recipientsCanonical,
                            iv: ivB64,
                            enc: encB64,
                            ts: tsNow
                        });
                    }
                    var digestBuf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(canonicalStr));
                    var sig = dsaImpl.sign(new Uint8Array(digestBuf), dsaSk);

                    // 5. Build envelope + send
                    var senderBlockG = {
                        name: teamEmail,
                        device: deviceId,
                        dsaPk: senderDsaPkB64,
                        fingerprint: senderFp
                    };
                    if (anyParticipantTyped) senderBlockG.participant = senderParticipantG;
                    var pkg = {
                        type: 'qrypto_chat_encrypted_group',
                        v: groupVersionTag,
                        sender: senderBlockG,
                        recipients: recipientsOut,
                        iv: ivB64,
                        enc: encB64,
                        sig: cryptoUtils.bytesToBase64(sig),
                        ts: tsNow
                    };

                    // Local echo
                    appendChatMsg('out', '[group] ' + text, teamEmail, deviceId, new Date().toLocaleTimeString());

                    await new Promise(function(resolve, reject) {
                        var xhr = new XMLHttpRequest();
                        xhr.open('POST', '/api/tunnel/tcp/send', true);
                        xhr.setRequestHeader('Content-Type', 'application/json');
                        xhr.onload = function() {
                            try {
                                var d = JSON.parse(xhr.responseText);
                                if (d.status === 'ok') resolve(d); else reject(new Error(d.reason || 'send error'));
                            } catch(e) { reject(e); }
                        };
                        xhr.onerror = function() { reject(new Error('network error')); };
                        xhr.send(JSON.stringify({plaintext: JSON.stringify(pkg)}));
                    });
                    return { recipients: recipientsOut.length, bundle_size: encB64.length };
                };

                // Expose for console / external driver (v2.1g test + UI wiring)
                window.doSendChatGroup = doSendChatGroup;

                return wrapContent(
                    <div className="space-y-4">
                        {!recipientPubKey ? (
                            <div className="bg-white border border-gray-200 rounded-xl p-4">
                                <div className="text-sm font-semibold text-gray-900 mb-2">Start Secure Chat</div>
                                <div className="flex gap-2 mb-2">
                                    <input type="email" placeholder="Recipient email address" value={recipientEmailInput}
                                        onChange={e => { setRecipientEmailInput(e.target.value); setEmailValid(e.target.value.length > 3 && e.target.value.includes('@')); }}
                                        onKeyDown={e => { if (e.key === 'Enter' && chatEmailValid && !processing) { e.preventDefault(); resolveRecipientWorkflow(); } }}
                                        className="flex-1 bg-gray-50 border border-gray-300 rounded-lg px-4 py-2.5 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:border-blue-500" />
                                    <button onClick={resolveRecipientWorkflow} disabled={!chatEmailValid || processing}
                                        className="px-4 py-2.5 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 text-white rounded-lg text-sm font-medium transition-colors">
                                        {processing ? 'Resolving...' : 'Verify'}
                                    </button>
                                </div>
                                {recipientLookupResult && recipientLookupResult.status === 'ready' && (
                                    <div className="space-y-2 mt-3">
                                        <div className="bg-green-50 border border-green-200 rounded-lg p-2">
                                            <p className="text-green-700 text-sm font-medium">{recipientEmailInput} verified — {recipientLookupResult.devices.length} device(s)</p>
                                        </div>
                                        {recipientLookupResult.devices.map((device) => (
                                            <button key={device.deviceId || device.token || 'default'} onClick={() => selectRecipientDevice(device)}
                                                className="w-full text-left bg-white border border-gray-200 hover:border-blue-400 hover:bg-blue-50 rounded-lg p-3 transition-colors">
                                                <div className="flex justify-between items-center">
                                                    <div>
                                                        <span className="text-gray-900 font-medium">{recipientEmailInput}</span>
                                                        <span className="text-gray-400 text-sm ml-2">({device.deviceId || 'default'})</span>
                                                    </div>
                                                    <span className="text-blue-600 text-xs">Select</span>
                                                </div>
                                            </button>
                                        ))}
                                    </div>
                                )}
                                {recipientLookupResult && recipientLookupResult.status === 'error' && (
                                    <div className="bg-red-50 border border-red-200 rounded-lg p-2 mt-2"><p className="text-red-700 text-sm">{recipientLookupResult.error}</p></div>
                                )}
                                {/* A3: Browse Agents — talk to agent consumers registered via HookRegistry */}
                                <div className="border-t border-gray-200 pt-3 mt-3">
                                    <div className="flex items-center justify-between mb-2">
                                        <span className="text-xs font-semibold text-gray-700">Or message an agent / service</span>
                                        <button onClick={loadAgents} disabled={agentLoading || processing}
                                            className="px-3 py-1.5 bg-purple-600 hover:bg-purple-700 disabled:bg-gray-300 text-white rounded-lg text-xs font-medium transition-colors">
                                            {agentLoading ? 'Loading…' : 'Browse Agents'}
                                        </button>
                                    </div>
                                    {showAgents && (
                                        <div className="space-y-2">
                                            {agentError && (
                                                <div className="bg-red-50 border border-red-200 rounded-lg p-2"><p className="text-red-700 text-xs">{agentError}</p></div>
                                            )}
                                            {agentList.length === 0 && !agentError && (
                                                <div className="bg-gray-50 border border-gray-200 rounded-lg p-2 text-xs text-gray-500">
                                                    No chat-capable agents registered. Agents must register via /api/hooks/register and POST a chat KEM pk to /api/hooks/&lt;id&gt;/chat_pk before they appear here.
                                                </div>
                                            )}
                                            {agentList.map(function(hook) {
                                                return (
                                                    <button key={hook.hook_id} onClick={function() { selectAgent(hook); }} disabled={processing}
                                                        className="w-full text-left bg-white border border-gray-200 hover:border-purple-400 hover:bg-purple-50 rounded-lg p-2.5 transition-colors disabled:opacity-50">
                                                        <div className="flex justify-between items-center">
                                                            <div>
                                                                <div className="text-sm font-medium text-gray-900">
                                                                    🤖 {hook.agent_id || '(unnamed agent)'}
                                                                    {hook.program_id && <span className="text-xs text-gray-500 ml-1">@ {hook.program_id}</span>}
                                                                </div>
                                                                <div className="text-xs text-gray-500 mt-0.5">
                                                                    hook={hook.hook_id.slice(0,8)} · kem_fp={hook.chat_kem_pk_fp || '?'}
                                                                </div>
                                                                {hook.last_fired_at && (
                                                                    <div className="text-xs text-gray-400">last_fired: {hook.last_fired_at}</div>
                                                                )}
                                                            </div>
                                                            <span className="text-purple-600 text-xs">Select</span>
                                                        </div>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                                <div className="text-xs text-gray-400 mt-2">Your device: {teamEmail} [{deviceId}]</div>
                            </div>
                        ) : (
                            <div className="bg-white border border-gray-200 rounded-xl overflow-hidden" style={{height: '60vh', display: 'flex', flexDirection: 'column'}}>
                                <div className="px-4 py-2 bg-gray-50 border-b border-gray-200 flex items-center justify-between">
                                    <div className="flex items-center gap-2">
                                        <span className="inline-block w-2.5 h-2.5 rounded-full bg-green-500"></span>
                                        <span className="text-sm font-semibold text-gray-900">{recipientName}</span>
                                        <span className="text-xs text-gray-400">| {recipientPubKey.fingerprint?.slice(0,12) || 'verified'}</span>
                                        {recipientPubKey.participant?.participant_type === 'agent' ? (
                                            <span className="text-xs text-purple-600 bg-purple-50 px-1 rounded">🤖 AGENT</span>
                                        ) : recipientPubKey.participant?.participant_type === 'service' ? (
                                            <span className="text-xs text-amber-600 bg-amber-50 px-1 rounded">⚙️ SERVICE</span>
                                        ) : (
                                            <span className="text-xs text-green-600 bg-green-50 px-1 rounded">DIRECT</span>
                                        )}
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <button onClick={() => { setRecipientPubKey(null); setRecipientLookupResult(null); setRecipientEmailInput(''); setShowAgents(false); setAgentList([]); setAgentError(''); }}
                                            className="text-xs text-blue-500 hover:text-blue-700">New Chat</button>
                                        <button onClick={goToKeyManagement} className="text-xs text-gray-400 hover:text-gray-700">Keys</button>
                                        <button onClick={logout} className="text-xs text-red-400 hover:text-red-600">Logout</button>
                                    </div>
                                </div>
                                <div id="chatMsgArea" className="flex-1 overflow-y-auto px-4 py-3 bg-gray-50" style={{display:'flex', flexDirection:'column'}}>
                                    <div className="text-center text-gray-400 text-sm mt-8 mb-4">
                                        <p className="text-sm">PQC Encrypted Chat with {recipientName}</p>
                                        <p className="text-xs mt-1">Messages encrypted via PQC tunnel</p>
                                    </div>
                                </div>
                                <div className="px-4 py-3 bg-white border-t border-gray-200">
                                    <div className="flex gap-2 items-center">
                                        <input type="file" id="chatAttachInput" style={{display:'none'}}
                                            onChange={async function(e) {
                                                var f = e.target.files && e.target.files[0];
                                                if (!f) return;
                                                e.target.value = '';
                                                try { await doSendChatAttachment(f); }
                                                catch(err) { addLog('Attachment send failed: ' + err.message, 'error'); }
                                            }} />
                                        <button onClick={function() { document.getElementById('chatAttachInput').click(); }}
                                            title="Attach file (SFT v2.1 — PQC encrypted)"
                                            className="px-3 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl text-base transition-colors border border-gray-300">📎</button>
                                        <input type="text" id="chatMsgInput" placeholder={'Message ' + recipientName + '...'}
                                            onKeyDown={function(e) { if (e.key === 'Enter') doSendChat(); }}
                                            className="flex-1 bg-gray-50 border border-gray-300 rounded-xl px-4 py-2.5 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500" />
                                        <button onClick={function() { doSendChat(); }}
                                            className="px-6 py-2.5 bg-gray-900 hover:bg-gray-800 text-white rounded-xl text-sm font-medium transition-colors">Send</button>
                                    </div>
                                    <div className="text-xs text-gray-400 mt-1.5">Qrypto Chat | DIRECT | {recipientName} | PQC Tunnel | 📎 = SFT v2.1 (ML-KEM-768 + ML-DSA-65 + AES-256-GCM)</div>
                                </div>
                            </div>
                        )}
                        <div className="grid md:grid-cols-3 gap-4">
                            <a href="filetransfer.html" className="text-center bg-blue-50 hover:bg-blue-100 text-blue-700 py-3 rounded-lg font-semibold transition-colors text-sm">Send File (SFT)</a>
                            <button onClick={goToKeyManagement} className="bg-gray-100 hover:bg-gray-200 text-gray-900 py-3 rounded-lg font-semibold transition-colors text-sm">Keypair Management</button>
                            <button onClick={logout} className="bg-red-50 hover:bg-red-100 text-red-700 py-3 rounded-lg font-semibold transition-colors text-sm">Logout</button>
                        </div>
                    </div>
                )
            }

            return (
                <div className="min-h-screen p-4">
                    {showLattice && (
                        <div className="lattice-container">
                            <LatticeCube size={200} colorBytes={latticeColorBytes} seedEmail={latticeSeedEmail} />
                        </div>
                    )}
                    <div className="max-w-4xl mx-auto main-content">
                        {/* Header */}
                        <div className="flex items-center justify-between mb-6">
                            <div>
                                <h1 className="text-2xl font-bold text-gray-900">
                                    {mode === 'send' ? '📤 Send Qrypto Chat' : '📥 Receive Qrypto Chat'}
                                </h1>
                                <p className="text-gray-500 text-sm">Step {step + 1} of 3</p>
                                <p className="text-green-600 text-xs mt-1">✅ Key Status: {identityStatus.type === 'valid' ? 'Valid' : 'Check Required'}</p>
                            </div>
                            <button onClick={reset} className="text-gray-500 hover:text-gray-700 text-sm">
                                ← Back to Start
                            </button>

                            <button onClick={logout} className="text-gray-500 hover:text-gray-700 text-sm">
                                Logout
                            </button>
                        </div>

                        {/* Progress Bar */}
                        <div className="flex gap-2 mb-6">
                            {[0, 1, 2].map(i => (
                                <div key={i} className={`h-2 flex-1 rounded ${i <= step ? 'bg-blue-500' : 'bg-gray-100'}`} />
                            ))}
                        </div>

                        <div className="grid lg:grid-cols-3 gap-6">
                            {/* Main Content */}
                            <div className="lg:col-span-2 bg-white border border-gray-200 rounded-xl p-6">
                                {/* SEND MODE */}
                                {mode === 'send' && (
                                    <>

                                        {step === 0 && (
                                            <div className="space-y-4">
                                                <h2 className="text-lg font-semibold text-gray-900">Sending as {teamEmail}</h2>
                                                <div className="bg-gray-50 rounded-lg p-4">
                                                    <p className="text-gray-700 mb-2">Your fingerprint:</p>
                                                    <code className="text-gray-800 font-mono text-sm">
                                                        {cryptoUtils.fingerprint(myKeys.dilithium.publicKey)}
                                                    </code>
                                                    <p className="text-gray-500 mt-2 text-sm">Device ID: {deviceId}</p>
                                                </div>
                                                <div className="border-t border-gray-300 pt-4">
                                                    <label className="block text-gray-700 font-medium mb-2">Recipient Email</label>
                                                    <div className="relative">
                                                        <input
                                                            type="email"
                                                            placeholder="name@company.com"
                                                            value={recipientEmailInput}
                                                            onChange={e => handleRecipientInput(e.target.value)}
                                                            onKeyDown={e => { if (e.key === 'Enter' && emailValid && !processing) { e.preventDefault(); resolveRecipientWorkflow(); } }}
                                                            className={'w-full bg-gray-50 text-gray-900 rounded-lg px-4 py-3 border focus:outline-none mb-1 ' + (recipientEmailInput && !emailValid ? 'border-red-300 focus:border-red-500' : 'border-gray-300 focus:border-blue-500')}
                                                        />
                                                        {recipientEmailInput && !emailValid && (
                                                            <p className="text-red-500 text-xs mb-2">Please enter a valid email address</p>
                                                        )}
                                                    </div>
                                                    <button
                                                        onClick={resolveRecipientWorkflow}
                                                        disabled={!emailValid || processing}
                                                        className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 text-white py-3 rounded-lg font-semibold transition-colors mt-2"
                                                    >
                                                        {processing ? '\u23F3 Resolving...' : recipientLookupResult && recipientLookupResult.status === 'invited' ? '\u2709 Invited \u2014 Resend?' : 'Send To This Recipient'}
                                                    </button>

                                                    {recipientLookupResult && recipientLookupResult.status === 'ready' && recipientLookupResult.devices.length > 1 && (
                                                        <div className="mt-4">
                                                            <div className="bg-green-50 border border-green-200 rounded-lg p-3 mb-3">
                                                                <p className="text-green-700 font-medium">\u2713 {recipientEmailInput} verified</p>
                                                                <p className="text-green-600 text-sm">{recipientLookupResult.devices.length} device(s) \u2014 select one to continue</p>
                                                            </div>
                                                            {recipientLookupResult.devices.map((device) => (
                                                                <button
                                                                    key={device.deviceId || device.token || 'default'}
                                                                    onClick={() => selectRecipientDevice(device)}
                                                                    className="w-full text-left bg-white border border-gray-200 hover:border-blue-400 hover:bg-blue-50 rounded-lg p-3 mb-2 transition-colors"
                                                                >
                                                                    <div className="flex justify-between items-center">
                                                                        <div>
                                                                            <span className="text-gray-900 font-medium">{recipientEmailInput}</span>
                                                                            <span className="text-gray-400 text-sm ml-2">({device.deviceId || 'default'})</span>
                                                                            {device.temporary && <span className="text-amber-500 text-xs ml-2">(temporary key)</span>}
                                                                        </div>
                                                                        <span className="text-gray-400 text-xs">{device.updated ? formatDateTime(device.updated) : 'new'}</span>
                                                                    </div>
                                                                </button>
                                                            ))}
                                                        </div>
                                                    )}

                                                    {recipientLookupResult && recipientLookupResult.status === 'error' && (
                                                        <div className="bg-red-50 border border-red-200 rounded-lg p-3 mt-4">
                                                            <p className="text-red-700 font-medium">Error</p>
                                                            <p className="text-red-600 text-sm">{recipientLookupResult.error}</p>
                                                        </div>
                                                    )}

                                                    {recipientLookupResult && recipientLookupResult.invited && recipientLookupResult.status !== 'ready' && (
                                                        <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 mt-4">
                                                            <p className="text-blue-700 font-medium">\u2709 Invitation sent</p>
                                                            <p className="text-blue-600 text-sm">{recipientEmailInput} will receive a validation link. Once they activate, you can send them files.</p>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        )}

                                        {step === 1 && (
                                            <div className="space-y-4">
                                                <h2 className="text-lg font-semibold text-gray-900">Compose Message</h2>
                                                <div className="bg-gray-50 rounded-lg p-3">
                                                    <span className="text-gray-500">To: </span>
                                                    <span className="text-gray-900">{recipientName}</span>
                                                    <span className="text-gray-400 text-xs ml-2">
                                                        ({recipientPubKey.fingerprint})
                                                    </span>
                                                </div>
                                                <input
                                                    type="text"
                                                    placeholder="Subject"
                                                    value={subject}
                                                    onChange={e => setSubject(e.target.value)}
                                                    className="w-full bg-gray-50 text-gray-900 rounded-lg px-4 py-3 border border-gray-300 focus:border-blue-500 focus:outline-none"
                                                />
                                                <textarea
                                                    placeholder="Message body..."
                                                    value={message}
                                                    onChange={e => setMessage(e.target.value)}
                                                    rows={5}
                                                    className="w-full bg-gray-50 text-gray-900 rounded-lg px-4 py-3 border border-gray-300 focus:border-blue-500 focus:outline-none resize-none"
                                                />
                                                <div>
                                                    <input
                                                        type="file"
                                                        multiple
                                                        onChange={handleFileAttachment}
                                                        className="w-full text-gray-700 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-blue-600 file:text-white hover:file:bg-blue-700"
                                                    />
                                                    {attachments.length > 0 && (
                                                        <div className="mt-2 space-y-1">
                                                            {attachments.map((a, i) => (
                                                                <div key={i} className="text-sm text-gray-500">
                                                                    📎 {a.name} ({(a.size / 1024).toFixed(1)} KB)
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                                <button
                                                    onClick={encryptAndSign}
                                                    disabled={!subject || !message || processing}
                                                    className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 text-white py-3 rounded-lg font-semibold"
                                                >
                                                    {processing ? '⏳ Encrypting...' : '🔒 Encrypt & Sign'}
                                                </button>
                                            </div>
                                        )}

                                        {step === 2 && encryptedPackage && (
                                            <div className="space-y-4">
                                                <h2 className="text-lg font-semibold text-gray-900">✅ File Transfer Encrypted!</h2>
                                                <div className="bg-green-900/30 border border-green-600 rounded-lg p-4">
                                                    <p className="text-green-600">Your message has been encrypted and signed.</p>
                                                    <p className="text-green-600 text-sm mt-2">
                                                        Download the .pqc.json file and send it to {recipientName} via any channel.
                                                    </p>
                                                </div>
                                                <button
                                                    onClick={downloadPackage}
                                                    className="w-full bg-green-600 hover:bg-green-500 text-gray-900 py-3 rounded-lg font-semibold"
                                                >
                                                    Download Encrypted Package
                                                </button>
                                            </div>
                                        )}
                                    </>
                                )}

                                {/* RECEIVE MODE */}
                                {mode === 'receive' && (
                                    <>

                                        {step === 0 && (
                                            <div className="space-y-4">
                                                <h2 className="text-lg font-semibold text-gray-900">Receiving as {teamEmail}</h2>
                                                <div className="bg-gray-50 rounded-lg p-4 mb-4">
                                                    <p className="text-gray-700 mb-2">Your fingerprint:</p>
                                                    <code className="text-green-600 font-mono text-sm">
                                                        {cryptoUtils.fingerprint(myKeys.dilithium.publicKey)}
                                                    </code>
                                                    <p className="text-gray-500 mt-2 text-sm">Device ID: {deviceId}</p>
                                                </div>

                                                <div className="border-t border-gray-300 pt-4">
                                                    <p className="text-gray-500 mb-2">Select Message Sender:</p>
                                                    <select
                                                        onClick={() => refreshTeamMembers({ withProcessing: false, logMessage: false })}
                                                        onChange={e => setSelectedMember(e.target.value)}
                                                        className="w-full text-gray-700 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-blue-600 hover:file:bg-blue-700"
                                                    >
                                                        <option key="empty" value="empty">None Selected</option>
                                                        {[...new Set(teamMembers.map(member => member.email))].map(email => (
                                                            <option key={email} value={email}>{email}</option>
                                                        ))}
                                                    </select>
                                                    <button
                                                        onClick={loadSelectedMemberKeys}
                                                        disabled={!selectedMember || selectedMember === 'empty' || processing}
                                                        className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 text-white py-3 rounded-lg font-semibold transition-colors"
                                                    >
                                                        Confirm Selected Sender
                                                    </button>
                                                </div>

                                            </div>
                                        )}

                                        {step === 1 && (
                                            <div className="space-y-4">
                                                <h2 className="text-lg font-semibold text-gray-900">Load & Decrypt</h2>
                                                {!receivedPackage ? (
                                                    <div>
                                                        <p className="text-gray-500 mb-2">Load encrypted file transfer (.pqc.json):</p>
                                                        <input
                                                            type="file"
                                                            accept=".json"
                                                            onChange={loadReceivedPackage}
                                                            className="w-full text-gray-700 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-green-600 file:text-white hover:file:bg-green-500"
                                                        />
                                                    </div>
                                                ) : (
                                                    <div className="space-y-4">
                                                        <div className="bg-gray-50 rounded-lg p-4">
                                                            <p className="text-gray-500">From: <span className="text-gray-900">{receivedPackage.sender.name}</span></p>
                                                            <p className="text-gray-400 text-xs">{receivedPackage.sender.fingerprint}</p>
                                                        </div>
                                                        <button
                                                            onClick={verifyAndDecrypt}
                                                            disabled={processing}
                                                            className="w-full bg-green-600 hover:bg-green-700 disabled:bg-gray-300 text-white py-3 rounded-lg font-semibold"
                                                        >
                                                            {processing ? '⏳ Decrypting...' : '🔓 Verify & Decrypt'}
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {step === 2 && decryptedData && (
                                            <div className="space-y-4">
                                                <h2 className="text-lg font-semibold text-gray-900">✅ Message Decrypted!</h2>
                                                <div className="bg-gray-50 rounded-lg p-4">
                                                    <p className="text-gray-500 text-sm">Subject:</p>
                                                    <p className="text-gray-900 font-semibold">{decryptedData.subject}</p>
                                                </div>
                                                <div className="bg-gray-50 rounded-lg p-4">
                                                    <p className="text-gray-500 text-sm">Message:</p>
                                                    <p className="text-gray-900 whitespace-pre-wrap">{decryptedData.body}</p>
                                                </div>
                                                {decryptedData.attachments?.length > 0 && (
                                                    <div className="bg-gray-50 rounded-lg p-4">
                                                        <p className="text-gray-500 text-sm mb-2">Attachments:</p>
                                                        {decryptedData.attachments.map((a, i) => (
                                                            <div key={i} className="flex items-center justify-between py-2">
                                                                <span className="text-gray-900">📎 {a.name}</span>
                                                                <button
                                                                    onClick={() => {
                                                                        const data = cryptoUtils.base64ToBytes(a.data);
                                                                        const blob = new Blob([data], { type: a.type });
                                                                        const url = URL.createObjectURL(blob);
                                                                        const link = document.createElement('a');
                                                                        link.href = url;
                                                                        link.download = a.name;
                                                                        link.click();
                                                                    }}
                                                                    className="text-blue-600 hover:text-blue-300 text-sm"
                                                                >
                                                                    ⬇️ Download
                                                                </button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </>
                                )}
                            </div>

                            {/* Log Panel */}
                            <div className="bg-gray-50/80 rounded-xl p-4 h-fit max-h-96 overflow-y-auto">
                                <h3 className="text-gray-500 text-sm font-semibold mb-3">📋 Operation Log</h3>
                                <div className="space-y-2 font-mono text-xs">
                                    {logs.length === 0 ? (
                                        <p className="text-gray-500">Waiting for operations...</p>
                                    ) : (
                                        logs.map((log, i) => (
                                            <div key={i} className={`${
                                                log.type === 'success' ? 'text-green-600' :
                                                log.type === 'error' ? 'text-red-600' :
                                                log.type === 'process' ? 'text-amber-600' : 'text-gray-500'
                                            }`}>
                                                <span className="text-gray-500">[{log.time}]</span> {log.msg}
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Footer */}
                        <div className="mt-6 text-center text-gray-400 text-xs">
                            Qrypto Trust Qrypto Chat Demo | FIPS 203 (ML-KEM-768) + FIPS 204 (ML-DSA-65) | Simulation for demonstration purposes
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<PQCEmailDemo />, document.getElementById('root'));
    </script>
</body>
</html>
