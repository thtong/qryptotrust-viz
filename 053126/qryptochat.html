                const dilithiumPk = sourceIdentity.dilithium.publicKey;
                const combined = new Uint8Array(kyberPk.length + dilithiumPk.length);
                combined.set(kyberPk, 0);
                combined.set(dilithiumPk, kyberPk.length);
                return combined;
            }, [myKeys, phase]);

            useEffect(() => {
                let mounted = true;
                ensureDeviceId().then((id) => {
                    if (mounted) setDeviceId(id);
                });
                return () => {
                    mounted = false;
                };
            }, []);

            const refreshTeamMembers = async ({ withProcessing = false, logMessage = true } = {}) => {
                if (withProcessing) setProcessing(true);

                try {
                    const members = await getAvailableTeamMembers();
                    if (members instanceof Error) {
                        showError(members.message);
                        return false;
                    }

                    setTeamMembers(members);
                    if (logMessage) addLog(`Refreshed member list (${members.length} available)`, 'info');
                    return true;
                } catch (error) {
                    showError(error);
                    return false;
                } finally {
                    if (withProcessing) setProcessing(false);
                }
            };

            const addLog = (msg, type = 'info') => {
                setLogs(prev => [...prev, { msg, type, time: new Date().toLocaleTimeString() }]);
            };

            const showError = (message) =>  {

                try {
                    message = JSON.parse(message).status;
                } catch (ignored) { }

                addLog(message);
                // TODO: Display toast error message.
                Toastify({
                    text: message,
                    duration: 3000,
                    newWindow: true,
                    close: true,
                    gravity: "top",
                    position: "center",
                    stopOnFocus: true,
                    style: {
                        background: "linear-gradient(to right, #0072AF, #0082FF)",
                    },
                    onClick: function(){} // Callback after click
                }).showToast();
                console.error("Error Received: ", message);
            }

            const handleRecipientInput = (value) => {
                setRecipientEmailInput(value);
                setEmailValid(isValidEmail(value));
                setRecipientLookupResult(null); // Reset on input change
            };

            const resolveRecipientWorkflow = async () => {
                if (!isValidEmail(recipientEmailInput)) {
                    addLog('Invalid email format', 'error');
                    return;
                }
                setProcessing(true);
                setRecipientLookupResult(null);
                addLog('Resolving recipient: ' + recipientEmailInput, 'process');

                try {
                    const result = await resolveRecipient(recipientEmailInput);
                    setRecipientLookupResult(result);

                    if (result.status === 'ready' && result.devices.length === 1) {
                        // Auto-select if only one device
                        const device = result.devices[0];
                        if (device.publicKey) {
                            setRecipientPubKey(device.publicKey);
                            setRecipientName(recipientEmailInput + (device.deviceId ? ' (' + device.deviceId + ')' : ''));
                            addLog('Recipient ready — proceeding to compose', 'success');
                            setStep(1);
                        }
                    }
                } catch (error) {
                    addLog('Resolution failed: ' + error.message, 'error');
                    setRecipientLookupResult({ status: 'error', error: error.message, devices: [], email: recipientEmailInput });
                } finally {
                    setProcessing(false);
                }
            };

            const selectRecipientDevice = async (device) => {
                setProcessing(true);
                try {
                    let pubKey = device.publicKey;
                    if (!pubKey && device.token) {
                        addLog('Fetching keys for device ' + (device.deviceId || 'default') + '...', 'process');
                        pubKey = await getMessageKey(device.token);
                    }
                    if (pubKey && !(pubKey instanceof Error)) {
                        setRecipientPubKey(pubKey);
                        setRecipientName(recipientEmailInput + (device.deviceId ? ' (' + device.deviceId + ')' : ''));
                        addLog('Recipient selected: ' + recipientEmailInput + ' (' + (device.deviceId || 'default') + ')', 'success');
                        setStep(1);
                    } else {
                        addLog('Failed to load recipient keys', 'error');
                    }
                } catch (error) {
                    addLog('Key load failed: ' + error.message, 'error');
                } finally {
                    setProcessing(false);
                }
            };

            const signIn = async () => {
                setProcessing(true);
                try {
                    const result = await requestAuthorization(teamEmail);
                    setProcessing(false);
                    if (result instanceof Error) {
                        showError(result.message);
                        return;
                    }
                    // Success
                    setPhase('code');

                } catch (error) {
                    showError(error);
                    setProcessing(false);
                }
            }

            const isIdentityValid = (id) => {
                if (!id) return false;
                if (!id.kyber?.publicKey || !id.kyber?.secretKey) return false;
                if (!id.dilithium?.publicKey || !id.dilithium?.secretKey) return false;
                try {
                    // Auto-detect DSA level from secret key size
                    const dsaImpl = id.dilithium.secretKey.length === 4896
                        ? noblePostQuantum.ml_dsa87
                        : id.dilithium.secretKey.length === 2560
                            ? noblePostQuantum.ml_dsa44
                            : noblePostQuantum.ml_dsa65;
                    dsaImpl.getPublicKey(id.dilithium.secretKey);
                    return true;
                } catch (e) {
                    return false;
                }
            };

            const checkIdentityStatus = async () => {
                let identity = getIdentityKeys();

                // If localStorage is empty, try to restore from vault (non-revoked active key)
                if (!identity) {
                    const vault = _mw.getKeyVault();
                    const currentDid = await ensureDeviceId();
                    const activeVaultKey = vault.find(v =>
                        v.active && !v.revoked && v.deviceId === currentDid && v.keys?.kyber?.secretKey
                    );
                    if (activeVaultKey) {
                        addLog(`Restoring active key from vault (${activeVaultKey.keyId.slice(0,8)})`, 'info');
                        writeLocalStorage("idKeys", serializeKeys(activeVaultKey.keys));
                        identity = activeVaultKey.keys;
                    } else {
                        // Check if vault has entries but private keys are missing
                        const orphaned = vault.find(v =>
                            v.active && !v.revoked && v.deviceId === currentDid && !v.keys?.kyber?.secretKey
                        );
                        if (orphaned) {
                            addLog(`Vault key ${orphaned.keyId.slice(0,8)} exists but private key storage is missing. Generate a new keypair.`, 'info');
                        }
                    }
                }

                if (!identity) {
                    return {
                        type: 'empty',
                        message: 'No local keypair found on this device. Generate a keypair to continue.',
                        identity: null
                    };
                }

                if (!isIdentityValid(identity)) {
                    return {
                        type: 'invalid-local',
                        message: 'Local keypair is invalid or corrupted. Generate a new keypair.',
                        identity: null
                    };
                }

                const currentDeviceId = await ensureDeviceId();
                const members = await getAvailableTeamMembers();
                if (members instanceof Error) {
                    throw members;
                }

                const xqIdentity = members.find(member =>
                    member.email === teamEmail && member.deviceId === currentDeviceId
                );

                if (!xqIdentity) {
                    return {
                        type: 'missing-xq',
                        message: 'Local keypair exists, but no matching key was found in XQ for this device.',
                        identity: null
                    };
                }

                const xqKey = await getMessageKey(xqIdentity.token);
                if (xqKey instanceof Error) {
                    throw xqKey;
                }

                const localKyberPublicKey = identity?.kyber?.publicKey
                    ? cryptoUtils.bytesToBase64(identity.kyber.publicKey)
                    : null;
                const localDilithiumPublicKey = identity?.dilithium?.publicKey
                    ? cryptoUtils.bytesToBase64(identity.dilithium.publicKey)
                    : null;

                const keyMatches =
                    localKyberPublicKey &&
                    localDilithiumPublicKey &&
                    localKyberPublicKey === xqKey.kyberPublicKey &&
                    localDilithiumPublicKey === xqKey.dilithiumPublicKey;

                if (!keyMatches) {
                    return {
                        type: 'mismatch',
                        message: 'Local keypair does not match the key stored in XQ. Generate a new keypair to replace it.',
                        identity: null
                    };
                }

                return {
                    type: 'valid',
                    message: 'Current keypair is available in XQ and valid for this device.',
                    identity
                };
            };

            const generateAndStoreIdentity = async () => {
                setIdentityAction('generating');
                try {
                    addLog('Generating ML-KEM-768 keypair...', 'process');
                    await new Promise(r => setTimeout(r, 500));
                    const kyberKeys = pqc.kyber.keygen();
                    addLog(`✓ Kyber public key: ${kyberKeys.publicKey.length} bytes`, 'success');

                    addLog('Generating ML-DSA-65 keypair...', 'process');
                    await new Promise(r => setTimeout(r, 500));
                    const dilithiumKeys = pqc.dilithium.keygen();
                    addLog(`✓ Dilithium public key: ${dilithiumKeys.publicKey.length} bytes`, 'success');

                    const identity = {
                        kyber: kyberKeys,
                        dilithium: dilithiumKeys,
                        name: teamEmail
                    };

                    const pubKeys = {
                        name: identity.name,
                        kyberPublicKey: cryptoUtils.bytesToBase64(identity.kyber.publicKey),
                        dilithiumPublicKey: cryptoUtils.bytesToBase64(identity.dilithium.publicKey),
                        fingerprint: cryptoUtils.fingerprint(identity.dilithium.publicKey)
                    };

                    const response = await storeIdentityKeys(identity, pubKeys);
                    if (response instanceof Error) {
                        showError(response.message);
                        return;
                    }

                    if (response?.replacedCount > 0) {
                        addLog(`✓ Replaced ${response.replacedCount} existing identity key(s) in XQ`, 'success');
                    } else {
                        addLog('✓ Uploaded identity keys to XQ', 'success');
                    }

                    setMyKeys(identity);
                    setIdentityStatus({
                        type: 'valid',
                        message: 'Current keypair is available in XQ and valid for this device.'
                    });

                    // Store in keyvault with lifecycle metadata
                    const keyId = _mw.vaultStore(identity, {
                        deviceId: identity.deviceId || deviceId,
                        fingerprint: cryptoUtils.fingerprint(identity.dilithium.publicKey),
                        expires: new Date(Date.now() + cfg.IDENTITY_EXPIRATION_DAYS * 86400000).toISOString()
                    });
                    addLog(`Key stored in vault (ID: ${keyId.slice(0,8)}...)`, 'info');
                } catch (error) {
                    showError(error);
                } finally {
                    setIdentityAction('idle');
                    await checkAdminRole();
                }
            };

            const checkAdminRole = async () => {
                try {
                    const dashToken = readSessionStorage('dashboardToken');
                    if (dashToken) {
                        const roleCheck = await fetch(cfg.DASHBOARD_URL + '/contact', {
                            method: 'POST',
                            headers: { 'Api-Key': cfg.DASHBOARD_API_KEY, 'Authorization': 'Bearer ' + dashToken, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: teamEmail })
                        });
                        if (roleCheck.status === 200 || roleCheck.status === 404) {
                            setIsAdmin(true);
                            addLog('Admin access confirmed', 'info');

                        }
                    }
                } catch(e) { setIsAdmin(false); }
            };

            const continueToApp = async () => {
                if (!myKeys || identityStatus.type !== 'valid') return;

                setIdentityAction('continuing');
                try {
                    // Ensure current key is in the vault (auto-seed on first use)
                    const vault = _mw.getKeyVault();
                    const currentFingerprint = cryptoUtils.fingerprint(myKeys.dilithium.publicKey);
                    const alreadyInVault = vault.some(e => e.fingerprint === currentFingerprint && !e.revoked);
                    if (!alreadyInVault) {
                        const keyId = _mw.vaultStore(myKeys, {
                            deviceId: myKeys.deviceId || deviceId,
                            fingerprint: currentFingerprint,
                            expires: new Date(Date.now() + cfg.IDENTITY_EXPIRATION_DAYS * 86400000).toISOString()
                        });
                        addLog(`Current key added to vault (${keyId.slice(0,8)})`, 'info');
                    }

                    const refreshed = await refreshTeamMembers({ withProcessing: false, logMessage: false });
                    if (!refreshed) return;
                    setPhase('ready');
                } finally {
                    setIdentityAction('idle');
                }
            };

            const refreshIdentityStatus = async () => {
                setIdentityAction('checking');
                try {
                    const status = await checkIdentityStatus();
                    setIdentityStatus({ type: status.type, message: status.message });
                    setMyKeys(status.identity || null);
                } catch (error) {
                    showError(error);
                } finally {
                    setIdentityAction('idle');
                }
            };

            const exportLocalKeypair = () => {
                const identity = getIdentityKeys();
                if (!identity) {
                    showError('No local keypair to export');
                    return;
                }

                try {
                    const payload = serializeKeys(identity);
                    const blob = new Blob([payload], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    const safeEmail = (teamEmail || 'user').replace(/[^a-zA-Z0-9@._-]/g, '_');
                    const safeDevice = (deviceId || 'device').replace(/[^a-zA-Z0-9_-]/g, '_');
                    link.href = url;
                    link.download = `pqc_identity_${safeEmail}_${safeDevice}.json`;
                    link.click();
                    URL.revokeObjectURL(url);
                    addLog('Exported local keypair', 'success');
                } catch (error) {
                    showError(error);
                }
            };

            const importLocalKeypair = async (event) => {
                const file = event.target.files?.[0];
                if (!file) return;

                setIdentityAction('importing');
                try {
                    const existingIdentity = getIdentityKeys();
                    if (existingIdentity) {
                        const shouldReplace = window.confirm('A local keypair already exists and will be replaced by the imported keypair. Continue?');
                        if (!shouldReplace) return;
                    }

                    const text = await file.text();
                    const imported = deserializeKeys(text);

                    // Normalize alternative key naming conventions
                    // kem/dsa → kyber/dilithium
                    if (!imported.kyber && imported.kem) { imported.kyber = imported.kem; delete imported.kem; }
                    if (!imported.dilithium && imported.dsa) { imported.dilithium = imported.dsa; delete imported.dsa; }
                    if (!imported.dilithium && imported.mlDsa) { imported.dilithium = imported.mlDsa; delete imported.mlDsa; }
                    if (!imported.kyber && imported.mlKem) { imported.kyber = imported.mlKem; delete imported.mlKem; }
                    // privateKey → secretKey
                    if (imported.kyber?.privateKey && !imported.kyber?.secretKey) {
                        imported.kyber.secretKey = imported.kyber.privateKey; delete imported.kyber.privateKey;
                    }
                    if (imported.dilithium?.privateKey && !imported.dilithium?.secretKey) {
                        imported.dilithium.secretKey = imported.dilithium.privateKey; delete imported.dilithium.privateKey;
                    }

                    if (!isIdentityValid(imported)) {
                        showError('Invalid keypair file — could not parse keys. Supported formats: native (Uint8Array), base64, hex, PEM');
                        return;
                    }

                    const currentDeviceId = await ensureDeviceId();
                    const importedDeviceId = imported?.deviceId;
                    imported.name = teamEmail;
                    imported.deviceId = currentDeviceId;

                    if (importedDeviceId && importedDeviceId !== currentDeviceId) {
                        addLog(`Imported keypair device ID (${importedDeviceId}) differs from this device (${currentDeviceId}); using current device ID for XQ upload`, 'info');
                    }

                    const pubKeys = {
                        name: imported.name,
                        kyberPublicKey: cryptoUtils.bytesToBase64(imported.kyber.publicKey),
                        dilithiumPublicKey: cryptoUtils.bytesToBase64(imported.dilithium.publicKey),
                        fingerprint: cryptoUtils.fingerprint(imported.dilithium.publicKey)
                    };

                    const response = await storeIdentityKeys(imported, pubKeys);
                    if (response instanceof Error) {
                        showError(response.message);
                        return;
                    }

                    setMyKeys(imported);
                    // Store imported key in vault
                    _mw.vaultStore(imported, {
                        deviceId: imported.deviceId || currentDeviceId,
                        fingerprint: cryptoUtils.fingerprint(imported.dilithium.publicKey),
                        expires: new Date(Date.now() + cfg.IDENTITY_EXPIRATION_DAYS * 86400000).toISOString()
                    });
                    if (response?.replacedCount > 0) {
                        addLog(`Imported keypair and replaced ${response.replacedCount} existing identity key(s) in XQ`, 'success');
                    } else {
                        addLog('Imported keypair and uploaded to XQ', 'success');
                    }
                    await refreshIdentityStatus();
                } catch (error) {
                    showError(error);
                } finally {
                    if (event.target) event.target.value = '';
                    setIdentityAction('idle');
                }
            };

            const deleteAllIdentityKeysInXQ = async () => {
                const confirmed = window.confirm('Delete all your PQC identity keys stored in XQ? This cannot be undone.');
                if (!confirmed) return;

                setIdentityAction('deleting');
                try {
                    const dashboardToken = readSessionStorage("dashboardToken");
                    const xqAccessToken = readSessionStorage("token");
                    if (!dashboardToken || !xqAccessToken) {
                        showError('Unauthorized');
                        return;
                    }

                    const response = await _apiFetch(`${cfg.DASHBOARD_URL}/communications?recipients=${cfg.IDENTITY_RECIPIENT}`, {
                        headers: {
                            "Api-Key": cfg.DASHBOARD_API_KEY,
                            "Authorization": `Bearer ${dashboardToken}`,
                        },
                    });

                    const { communications = [] } = await response.json();
                    const myIdentityKeys = communications.filter(contact => {
                        if (contact.status !== 0) return false;
                        if (contact.user !== teamEmail) return false;
                        const meta = parseCommunicationMeta(contact.meta);
                        return (meta?.title || '').startsWith(cfg.IDENTITY_TITLE);
                    });

                    let deletedCount = 0;
                    for (const identity of myIdentityKeys) {
                        const deleted = await deleteKeyByToken(identity.token, xqAccessToken);
                        if (deleted) deletedCount += 1;
                    }

                    addLog(`Deleted ${deletedCount} key(s) from XQ`, deletedCount > 0 ? 'success' : 'info');

                    const status = await checkIdentityStatus();
                    setIdentityStatus({ type: status.type, message: status.message });
                    setMyKeys(status.identity || null);
                } catch (error) {
                    showError(error);
                } finally {
                    setIdentityAction('idle');
                }
            };

            const validateCode = async () => {
                setProcessing(true);
                try {

                    const result = await validateAuthorization(pin);
                    if (result instanceof Error) {
                        showError(result.message);
                        setProcessing(false);
                        return;
                    }

                    addLog('Checking current keypair status...', 'process');
                    const status = await checkIdentityStatus();
                    setIdentityStatus({ type: status.type, message: status.message });
                    setMyKeys(status.identity || null);
                    setProcessing(false);
                    setPhase('identity');
                    await checkAdminRole();

                } catch (error) {
                    showError(error);
                    setProcessing(false);
                }
            }

            const loadSelectedMemberKeys = async () => {
                setProcessing(true);
                try {
                   if (mode === 'receive') {
                       const senderMembers = teamMembers.filter(member => member.email === selectedMember);
                       if (senderMembers.length === 0) {
                           showError("Invalid Sender");
                           setProcessing(false);
                           return;
                       }

                       const loadedSenderKeys = [];
                       for (const senderMember of senderMembers) {
                           const pubKey = await getMessageKey(senderMember.token);
                           if (pubKey instanceof Error) {
                               continue;
                           }

                           loadedSenderKeys.push({
                               email: senderMember.email,
                               token: senderMember.token,
                               deviceId: senderMember.deviceId,
                               name: pubKey.name,
                               kyberPublicKey: pubKey.kyberPublicKey instanceof Uint8Array
                                   ? pubKey.kyberPublicKey
                                   : cryptoUtils.base64ToBytes(pubKey.kyberPublicKey),
                               dilithiumPublicKey: pubKey.dilithiumPublicKey instanceof Uint8Array
                                   ? pubKey.dilithiumPublicKey
                                   : cryptoUtils.base64ToBytes(pubKey.dilithiumPublicKey),
                               fingerprint: pubKey.fingerprint
                           });
                       }

                       if (loadedSenderKeys.length === 0) {
                           showError("Unable to load sender public keys");
                           setProcessing(false);
                           return;
                       }

                       setSenderKeyCandidates(loadedSenderKeys);
                       setRecipientName(selectedMember);
                       addLog(`Loaded ${loadedSenderKeys.length} public key(s) for ${selectedMember}`, 'success');
                       setProcessing(false);
                       setStep(1);
                       return;
                   }

                   const index = teamMembers.findIndex(member => member.token === selectedMember );
                   if (index < 0) {
                       showError("Invalid Member");
                       setProcessing(false);
                       return;
                   }

                   // Retrieve the public key for the selected member.
                   const pubKey = await getMessageKey(teamMembers[index].token);
                   if (pubKey instanceof Error) {
                       showError(pubKey.message);
                       setProcessing(false);
                       return;
                   }

                    setRecipientPubKey({
                        name: pubKey.name,
                        kyberPublicKey: cryptoUtils.base64ToBytes(pubKey.kyberPublicKey),
                        dilithiumPublicKey: cryptoUtils.base64ToBytes(pubKey.dilithiumPublicKey),
                        fingerprint: pubKey.fingerprint
                    });

                    const selectedRecipient = teamMembers[index];
                    const selectedRecipientLabel = selectedRecipient.deviceId
                        ? `${selectedRecipient.email} (${selectedRecipient.deviceId})`
                        : selectedRecipient.email;

                    setProcessing(false);
                    setRecipientName(selectedRecipientLabel);
                    addLog(`Loaded public keys for ${selectedRecipientLabel}`, 'success');

                   setStep(1);

                } catch (error) {
                    showError(error);
                    setProcessing(false);
                }
            }



            const generateKeys = async () => {
                setProcessing(true);
                addLog('Generating ML-KEM-768 keypair...', 'process');
                await new Promise(r => setTimeout(r, 500));
                const kyberKeys = pqc.kyber.keygen();
                addLog(`✓ Kyber public key: ${kyberKeys.publicKey.length} bytes`, 'success');

                addLog('Generating ML-DSA-65 keypair...', 'process');
                await new Promise(r => setTimeout(r, 500));
                const dilithiumKeys = pqc.dilithium.keygen();
                addLog(`✓ Dilithium public key: ${dilithiumKeys.publicKey.length} bytes`, 'success');

                const keys = {
                    kyber: kyberKeys,
                    dilithium: dilithiumKeys,
                    name: userName
                };
                setMyKeys(keys);
                addLog(`Keys generated for ${userName}`, 'success');
                const fp = cryptoUtils.fingerprint(dilithiumKeys.publicKey);
                addLog(`Fingerprint: ${fp}`, 'info');
                setStep(1);
                setProcessing(false);
            };

            const handleFileAttachment = async (e) => {
                const files = Array.from(e.target.files);
                const newAttachments = await Promise.all(files.map(async (file) => {
                    const buffer = await file.arrayBuffer();
                    return {
                        name: file.name,
                        type: file.type,
                        size: file.size,
                        data: new Uint8Array(buffer)
                    };
                }));
                setAttachments(prev => [...prev, ...newAttachments]);
                addLog(`Added ${files.length} attachment(s)`, 'info');
            };

            const encryptAndSign = async () => {
                setProcessing(true);
                addLog('Starting encryption process...', 'process');
                
                try {
                    // Prepare payload
                    addLog('Preparing payload...', 'process');
                    await new Promise(r => setTimeout(r, 200));
                    
                    const payload = {
                        subject,
                        body: message,
                        attachments: attachments.map(a => ({
                            name: a.name,
                            type: a.type,
                            data: cryptoUtils.bytesToBase64(a.data)
                        })),
                        timestamp: new Date().toISOString()
                    };
                    const payloadStr = JSON.stringify(payload);
                    const payloadBytes = new TextEncoder().encode(payloadStr);
                    addLog(`✓ Payload prepared: ${payloadBytes.length} bytes`, 'success');
                    let suiteName, suite;
                    try {
                        suiteName = pqc.getSuiteName();
                        suite = pqc.getSuite();
                    } catch(e) {}
                    if (!suite) {
                        // Fallback: detect from the recipient's key size
                        suite = detectKemSuite(recipientPubKey.kyberPublicKey)
                            || pqcSuites['ML-KEM-768+ML-DSA-65']
                            || { label: 'Default', kemName: 'ML-KEM-768', dsaName: 'ML-DSA-65', security: 192, kemPkSize: 1184, kemCtSize: 1088, kemSkSize: 2400, dsaPkSize: 1952, dsaSigSize: 3309 };
                        suiteName = suite.kemName + '+' + suite.dsaName;
                        addLog(`Suite auto-detected from recipient key: ${suiteName}`, 'info');
                    } else {
                        addLog(`Suite: ${suiteName} (${suite.label})`, 'info');
                    }

                    // ML-KEM encapsulation — use noble directly to avoid wrapper issues
                    addLog(`Performing ${suite.kemName} encapsulation...`, 'process');
                    await new Promise(r => setTimeout(r, 400));
                    const _kemImpl = suite.kem || noblePostQuantum.ml_kem768;
                    const _encResult = _kemImpl.encapsulate(recipientPubKey.kyberPublicKey);
                    const sharedSecret = _encResult.sharedSecret;
                    const ciphertext = _encResult.cipherText;
                    // Log SS for cross-machine verification
                    const ssDebug = Array.from(sharedSecret.slice(0,8));
                    const ctDebug = Array.from(ciphertext.slice(0,8));
                    addLog(`Encapsulated (direct). SS[0:8]: [${ssDebug}]`, 'info');
                    addLog(`CT[0:8]: [${ctDebug}], CT len: ${ciphertext.length}`, 'info');

                    // Verify: decapsulate our own CT with recipient PK should give same SS
                    // (we can't do this — we don't have recipient SK)
                    // Instead, embed SS fingerprint in package for debug
                    const _ssFingerprint = Array.from(sharedSecret).map(b => b.toString(16).padStart(2,'0')).join('').slice(0,16);
                    addLog(`SS fingerprint: ${_ssFingerprint}`, 'info');
                    
                    // AES-GCM encryption — sharedSecret (32 bytes) used directly as AES-256 key
                    addLog('Encrypting with AES-256-GCM...', 'process');
                    await new Promise(r => setTimeout(r, 300));
                    const { iv, encrypted } = await aes.encrypt(payloadBytes, sharedSecret);
                    addLog(`✓ Encrypted payload: ${encrypted.length} bytes`, 'success');
                    
                    // Build package metadata BEFORE signing — signature covers full envelope
                    const now = new Date().toISOString();
                    const senderFingerprint = cryptoUtils.fingerprint(myKeys.dilithium.publicKey);
                    const recipientKemB64 = recipientPubKey.kyberPublicKey instanceof Uint8Array
                        ? cryptoUtils.bytesToBase64(recipientPubKey.kyberPublicKey)
                        : recipientPubKey.kyberPublicKey;
                    const recipientFingerprint = recipientPubKey.fingerprint
                        || (recipientPubKey.dilithiumPublicKey instanceof Uint8Array
                            ? cryptoUtils.fingerprint(recipientPubKey.dilithiumPublicKey)
                            : null);
                    const pkg = {
                        version: '2.0',
                        // --- Certificate Header (X.509-reflective) ---
                        certificate: {
                            serialNumber: crypto.randomUUID?.() || Date.now().toString(36),
                            issuer: {
                                commonName: myKeys.name,
                                deviceId: myKeys.deviceId || deviceId || 'default',
                                fingerprint: senderFingerprint
                            },
                            subject: {
                                commonName: recipientPubKey.name || recipientPubKey.email || recipientName,
                                deviceId: recipientPubKey.deviceId || null,
                                fingerprint: recipientFingerprint
                            },
                            validity: {
                                notBefore: now,
                                notAfter: new Date(Date.now() + 365 * 86400000).toISOString()
                            },
                            subjectPublicKeyInfo: {
                                algorithm: suite.kemName,
                                publicKey: recipientKemB64,
                                publicKeyFingerprint: recipientFingerprint
                            },
                            issuerPublicKeyInfo: {
                                kemAlgorithm: suite.kemName,
                                kemPublicKey: cryptoUtils.bytesToBase64(myKeys.kyber.publicKey),
                                dsaAlgorithm: suite.dsaName,
                                dsaPublicKey: cryptoUtils.bytesToBase64(myKeys.dilithium.publicKey),
                                dsaFingerprint: senderFingerprint
                            }
                        },
                        // --- Encryption Envelope ---
                        algorithm: {
                            suite: suiteName,
                            kem: suite.kemName,
                            sig: suite.dsaName,
                            enc: 'AES-256-GCM',
                            securityLevel: suite.security,
                            kemParams: { publicKeyBytes: suite.kemPkSize, ciphertextBytes: suite.kemCtSize, sharedSecretBytes: 32 },
                            sigParams: { publicKeyBytes: suite.dsaPkSize, signatureBytes: suite.dsaSigSize },
                            encParams: { keyBytes: 32, ivBytes: 12, tagBytes: 16 }
                        },
                        _debug: { ssFingerprint: _ssFingerprint, ctFirst8: Array.from(ciphertext.slice(0,8)), ssFirst8: Array.from(sharedSecret.slice(0,8)) },
                        kemCiphertext: cryptoUtils.bytesToBase64(ciphertext),
                        iv: cryptoUtils.bytesToBase64(iv),
                        encryptedPayload: cryptoUtils.bytesToBase64(encrypted),
                        signature: null, // placeholder — computed over full envelope below
                        signatureScope: 'envelope', // indicates sig covers cert+kem+iv+payload (v2.1+)
                        // --- Backward compat fields ---
                        sender: {
                            name: myKeys.name,
                            fingerprint: senderFingerprint,
                            masterDevice: myKeys.deviceId || deviceId || 'default',
                            dsaPublicKey: cryptoUtils.bytesToBase64(myKeys.dilithium.publicKey),
                            kemPublicKey: cryptoUtils.bytesToBase64(myKeys.kyber.publicKey)
                        },
                        recipient: {
                            name: recipientName,
                            fingerprint: recipientFingerprint,
                            deviceId: recipientPubKey.deviceId || null,
                            kemPublicKey: recipientKemB64
                        },
                        timestamp: now
                    };
                    
                    // ML-DSA envelope signature — covers certificate + crypto payload
                    // This prevents certificate swapping attacks
                    addLog(`Signing envelope with ${suite.dsaName}...`, 'process');
                    await new Promise(r => setTimeout(r, 400));
                    const envelopeData = JSON.stringify({
                        certificate: pkg.certificate,
                        kemCiphertext: pkg.kemCiphertext,
                        iv: pkg.iv,
                        encryptedPayload: pkg.encryptedPayload
                    });
                    const envelopeBytes = new TextEncoder().encode(envelopeData);
                    const signature = pqc.dilithium.sign(envelopeBytes, myKeys.dilithium.secretKey);
                    pkg.signature = cryptoUtils.bytesToBase64(signature);
                    addLog(`✓ Envelope signature: ${signature.length} bytes (covers cert+KEM+IV+payload)`, 'success');

                    setEncryptedPackage(pkg);
                    addLog('✓ Encryption complete!', 'success');
                    setStep(2);
                } catch (error) {
                    addLog(`✗ Error: ${error.message}`, 'error');
                    console.error('Encryption error:', error);
                } finally {
                    setProcessing(false);
                }
            };

            const downloadPackage = () => {
                const blob = new Blob([JSON.stringify(encryptedPackage, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `encrypted_email_${Date.now()}.pqc.json`;
                a.click();
                addLog('Downloaded encrypted package', 'success');
            };

            const loadReceivedPackage = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const text = await file.text();
                const pkg = JSON.parse(text);
                setReceivedPackage(pkg);

                // Log certificate info (v2.0) or fallback to sender info (v1.x)
                const cert = pkg.certificate;
                if (cert) {
                    addLog(`Package v${pkg.version} | Serial: ${cert.serialNumber?.slice(0,8)}...`, 'info');
                    addLog(`Issuer: ${cert.issuer.commonName} [${cert.issuer.deviceId}] fingerprint ${cert.issuer.fingerprint}`, 'info');
                    addLog(`Subject: ${cert.subject.commonName} [${cert.subject.deviceId || 'default'}]`, 'info');
                    addLog(`Valid: ${cert.validity.notBefore.slice(0,10)} to ${cert.validity.notAfter.slice(0,10)}`, 'info');
                    addLog(`Recipient KEM key: ${cert.subjectPublicKeyInfo.publicKey?.slice(0,24)}...`, 'info');
                    addLog(`Issuer DSA key embedded for verification`, 'success');
                } else {
                    const masterInfo = pkg.sender?.masterDevice ? ` [master: ${pkg.sender.masterDevice}]` : '';
                    const keyInfo = pkg.sender?.dsaPublicKey ? ' (verification key embedded)' : ' (manual key lookup required)';
                    addLog(`Loaded package v${pkg.version || '1.0'} from ${pkg.sender.name}${masterInfo}${keyInfo}`, 'info');
                }
                setStep(1);
            };

            const verifyAndDecrypt = async () => {
                setProcessing(true);
                addLog('Starting secure decryption (strict policy)...', 'process');

                try {
                    const ciphertext = cryptoUtils.base64ToBytes(receivedPackage.kemCiphertext);
                    const encrypted = cryptoUtils.base64ToBytes(receivedPackage.encryptedPayload);
                    const signature = cryptoUtils.base64ToBytes(receivedPackage.signature);
                    const iv = cryptoUtils.base64ToBytes(receivedPackage.iv);

                    // === REFINEMENT 1: VERIFY SIGNATURE BEFORE DECRYPT ===
                    // Extract sender key from certificate/sender field
                    const issuerInfo = receivedPackage.certificate?.issuerPublicKeyInfo;
                    const senderDsaB64 = issuerInfo?.dsaPublicKey || receivedPackage.sender?.dsaPublicKey;
                    const senderKemB64 = issuerInfo?.kemPublicKey || receivedPackage.sender?.kemPublicKey;
                    const senderName = receivedPackage.certificate?.issuer?.commonName || receivedPackage.sender?.name;
                    const senderDevice = receivedPackage.certificate?.issuer?.deviceId || receivedPackage.sender?.masterDevice;
                    const declaredFingerprint = receivedPackage.certificate?.issuer?.fingerprint || receivedPackage.sender?.fingerprint;

                    if (!senderDsaB64) {
                        addLog('BLOCKED: No sender DSA public key in package — cannot verify authenticity', 'error');
                        setProcessing(false);
                        return;
                    }

                    const senderDsaPk = cryptoUtils.base64ToBytes(senderDsaB64);
                    const senderFingerprint = cryptoUtils.fingerprint(senderDsaPk);
                    addLog(`Issuer: ${senderName} [${senderDevice}] fingerprint ${senderFingerprint}`, 'info');

                    if (declaredFingerprint && senderFingerprint !== declaredFingerprint) {
                        addLog('BLOCKED: Embedded key fingerprint does not match certificate — tampering detected', 'error');
                        setProcessing(false);
                        return;
                    }

                    // Determine what the signature covers
                    const isEnvelopeSig = receivedPackage.signatureScope === 'envelope';
                    let signedData;
                    if (isEnvelopeSig) {
                        // v2.1+: signature covers certificate + crypto payload
                        const envelopeData = JSON.stringify({
                            certificate: receivedPackage.certificate,
                            kemCiphertext: receivedPackage.kemCiphertext,
                            iv: receivedPackage.iv,
                            encryptedPayload: receivedPackage.encryptedPayload
                        });
                        signedData = new TextEncoder().encode(envelopeData);
                        addLog('Signature scope: full envelope (cert + KEM + IV + payload)', 'info');
                    } else {
                        // v1.x/v2.0: signature covers encrypted payload only
                        signedData = encrypted;
                        addLog('Signature scope: encrypted payload only (legacy)', 'info');
                    }

                    // Verify signature BEFORE any decryption
                    addLog('Verifying sender signature BEFORE decrypt...', 'process');
                    const sigValid = pqc.dilithium.verify(signedData, signature, senderDsaPk);
                    if (!sigValid) {
                        addLog('BLOCKED: Sender signature verification FAILED — package may be forged or corrupted', 'error');
                        setProcessing(false);
                        return;
                    }
                    addLog(`✓ Signature verified: ${senderName} [${senderDevice}]`, 'success');

                    // === REFINEMENT 3: KEY PINNING (TOFU) ===
                    const pinKey = `pinnedKey_${senderName}_${senderDevice}`;
                    const pinnedFp = readLocalStorage(pinKey);
                    if (pinnedFp) {
                        if (pinnedFp !== senderFingerprint) {
                            addLog(`WARNING: Sender key CHANGED since first use! Pinned: ${pinnedFp}, Current: ${senderFingerprint}. Possible key compromise.`, 'error');
                            if (!window.confirm(`Sender ${senderName} [${senderDevice}] key has CHANGED.\n\nPinned fingerprint: ${pinnedFp}\nPackage fingerprint: ${senderFingerprint}\n\nThis could indicate key compromise. Continue anyway?`)) {
                                addLog('Decrypt CANCELLED by user (key pinning mismatch)', 'error');
                                setProcessing(false);
                                return;
                            }
                            // User accepted — update pin
                            writeLocalStorage(pinKey, senderFingerprint);
                        } else {
                            addLog(`✓ Sender key matches pinned fingerprint (TOFU verified)`, 'success');
                        }
                    } else {
                        // First use — pin this sender's key
                        writeLocalStorage(pinKey, senderFingerprint);
                        addLog(`Sender key pinned on first use: ${senderFingerprint}`, 'info');
                    }

                    // === REFINEMENT 2: ONLINE SENDER KEY VALIDATION ===
                    // Check XQ to confirm sender key is still valid (strict policy for demo)
                    let senderKeyRevoked = false;
                    try {
                        addLog('Checking sender key status in XQ (strict policy)...', 'process');
                        const senderMembers = teamMembers.filter(m => m.email === senderName);
                        if (senderMembers.length > 0) {
                            let senderKeyFound = false;
                            for (const sm of senderMembers) {
                                const xqKey = await getMessageKey(sm.token);
                                if (xqKey && !(xqKey instanceof Error)) {
                                    const xqDsaPk = xqKey.dilithiumPublicKey instanceof Uint8Array
                                        ? xqKey.dilithiumPublicKey
                                        : (typeof xqKey.dilithiumPublicKey === 'string' ? cryptoUtils.base64ToBytes(xqKey.dilithiumPublicKey) : null);
                                    if (xqDsaPk && cryptoUtils.fingerprint(xqDsaPk) === senderFingerprint) {
                                        senderKeyFound = true;
                                        addLog(`✓ Sender key confirmed active in XQ (device: ${sm.deviceId || 'default'})`, 'success');
                                        break;
                                    }
                                }
                            }
                            if (!senderKeyFound) {
                                senderKeyRevoked = true;
                                addLog(`ALERT: Sender key ${senderFingerprint} NOT FOUND in XQ — may be revoked or rotated`, 'error');
                            }
                        } else {
                            addLog('Sender not in team members list — cannot verify key status online', 'info');
                        }
                    } catch (e) {
                        addLog(`XQ check failed (${e.message}) — proceeding with embedded key (offline mode)`, 'info');
                    }

                    if (senderKeyRevoked) {
                        addLog('STRICT POLICY: Sender key revoked/missing in XQ. Decrypt blocked.', 'error');
                        addLog('To decrypt anyway (offline mode), the strict policy must be disabled.', 'info');
                        setProcessing(false);
                        return;
                    }

                    // Build sender candidates for UI display
                    let senderCandidates = mode === 'receive' ? senderKeyCandidates : [recipientPubKey];
                    const embeddedCandidate = {
                        email: senderName,
                        deviceId: senderDevice || 'embedded',
                        dilithiumPublicKey: senderDsaPk,
                        fingerprint: senderFingerprint
                    };
                    if (senderKemB64) {
                        embeddedCandidate.kyberPublicKey = cryptoUtils.base64ToBytes(senderKemB64);
                    }
                    senderCandidates = [embeddedCandidate, ...(senderCandidates || [])];

                    if (!senderCandidates || senderCandidates.length === 0) {
                        addLog('No sender public keys available — load sender keys or use a v1.1 package with embedded keys', 'error');
                        setProcessing(false);
                        return;
                    }

                    // Build list of decryption keys — current key + all vault keys
                    // Use certificate.subjectPublicKeyInfo (v2.0) or recipient.kemPublicKey (v1.1) for key matching
                    const decryptionKeys = [];
                    const vaultKeys = _mw.vaultDecryptionKeys();
                    const pkgRecipientKem = receivedPackage.certificate?.subjectPublicKeyInfo?.publicKey
                        || receivedPackage.recipient?.kemPublicKey
                        || null;

                    // Helper: check if a key's KEM public key matches the package's target
                    const kemMatches = (keys) => {
                        if (!pkgRecipientKem || !keys?.kyber?.publicKey) return false;
                        return cryptoUtils.bytesToBase64(keys.kyber.publicKey) === pkgRecipientKem;
                    };

                    // Try to find the exact matching key first
                    let matchFound = false;
                    if (pkgRecipientKem) {
                        // Check current key
                        if (kemMatches(myKeys)) {
                            decryptionKeys.push({ label: 'current (matched)', keys: myKeys });
                            matchFound = true;
                            addLog('Recipient key match: current active key matches package target', 'success');
                        }
                        // Check vault keys
                        for (const vk of vaultKeys) {
                            if (vk.keys?.kyber?.secretKey && kemMatches(vk.keys)) {
                                decryptionKeys.unshift({ label: `vault:${vk.deviceId}:${vk.keyId?.slice(0,8)} (matched)`, keys: vk.keys, vaultEntry: vk });
                                matchFound = true;
                                addLog(`Recipient key match: vault key ${vk.keyId?.slice(0,8)} (${vk.deviceId}) from ${new Date(vk.created).toLocaleDateString()}`, 'success');
                            }
                        }
                        if (!matchFound) {
                            addLog(`No key in vault matches package target KEM key (${pkgRecipientKem.slice(0,20)}...). Will try all keys.`, 'info');
                        }
                    }

                    // Try current key from localStorage (if not revoked/cleared)
                    const currentIdKeys = getIdentityKeys();
                    if (currentIdKeys?.kyber?.secretKey) {
                        // Check if this key has been revoked in the vault
                        const currentFp = currentIdKeys.dilithium?.publicKey
                            ? cryptoUtils.fingerprint(currentIdKeys.dilithium.publicKey) : null;
                        const isRevoked = vaultKeys.length === 0 ? false :
                            _mw.getKeyVault().some(v => v.fingerprint === currentFp && v.revoked);
                        if (isRevoked) {
                            addLog('Current key has been REVOKED — skipping', 'error');
                        } else {
                            decryptionKeys.unshift({ label: 'current (localStorage)', keys: currentIdKeys });
                        }
                    } else {
                        addLog('No current key in localStorage (may have been revoked)', 'info');
                    }
                    // Add non-revoked vault keys
                    for (const vk of vaultKeys) {
                        if (vk.keys?.kyber?.secretKey && !vk.revoked) {
                            const alreadyAdded = decryptionKeys.some(dk => dk.vaultEntry?.keyId === vk.keyId);
                            if (!alreadyAdded) {
                                decryptionKeys.push({ label: `vault:${vk.deviceId}:${vk.keyId?.slice(0,8)}`, keys: vk.keys, vaultEntry: vk });
                            }
                        }
                    }

                    addLog(`${decryptionKeys.length} decryption key(s) available${matchFound ? ' (target key identified)' : ''}`, 'info');

                    // Check for revoked keys warning
                    if (receivedPackage.recipient?.kemPublicKey) {
                        const pkgRecipientKem = receivedPackage.recipient.kemPublicKey;
                        addLog(`Package encrypted for recipient key: ${pkgRecipientKem.slice(0,20)}...`, 'info');
                    }
                    if (receivedPackage.encryptedAt) {
                        addLog(`Package encrypted at: ${receivedPackage.encryptedAt}`, 'info');
                    }

                    // Try ML-KEM decapsulation with each available key
                    let sharedSecret = null;
                    let usedKeyLabel = '';
                    for (const dk of decryptionKeys) {
                        try {
                            addLog(`Trying ML-KEM-768 decapsulation with ${dk.label}...`, 'process');
                            // Detect KEM level from ciphertext and call noble directly
                            const _dkSuite = detectKemSuite(ciphertext) || { kem: noblePostQuantum.ml_kem768 };
                            sharedSecret = _dkSuite.kem.decapsulate(ciphertext, dk.keys.kyber.secretKey);
                            const _decSS = Array.from(sharedSecret.slice(0,8));
                            const _decCT = Array.from(ciphertext.slice(0,8));
                            addLog(`Decap SS[0:8]: [${_decSS}]`, 'info');
                            addLog(`Decap CT[0:8]: [${_decCT}] CT len: ${ciphertext.length} SK len: ${dk.keys.kyber.secretKey.length}`, 'info');
                            // Compare against package debug if present
                            if (receivedPackage._debug) {
                                const pkgSS = receivedPackage._debug.ssFirst8;
                                const pkgCT = receivedPackage._debug.ctFirst8;
                                const ssMatch = pkgSS && _decSS.every((b,i) => b === pkgSS[i]);
                                const ctMatch = pkgCT && _decCT.every((b,i) => b === pkgCT[i]);
                                addLog(`Sender SS[0:8]: [${pkgSS}] ${ssMatch ? 'MATCH' : 'MISMATCH'}`, ssMatch ? 'success' : 'error');
                                addLog(`Sender CT[0:8]: [${pkgCT}] ${ctMatch ? 'MATCH' : 'MISMATCH'}`, ctMatch ? 'success' : 'error');
                            }
                            usedKeyLabel = dk.label;

                            // Check if this vault key is expired
                            if (dk.vaultEntry?.expires && new Date(dk.vaultEntry.expires) < new Date()) {
                                addLog(`WARNING: Decryption key ${dk.label} is EXPIRED (${dk.vaultEntry.expires})`, 'error');
                            }
                            break;
                        } catch (e) {
                            addLog(`Decapsulation failed with ${dk.label}: ${e.message}`, 'info');
                            continue;
                        }
                    }

                    // Try each decryption key (decapsulate + AES) paired with each sender (signature)
                    // ML-KEM implicit rejection: wrong key returns valid-looking but wrong shared secret
                    // AES-GCM auth tag check catches this — so we must try AES after each decapsulation
                    let decrypted = false;

                    for (const dk of decryptionKeys) {
                        if (decrypted) break;

                        let ss;
                        try {
                            const _dkSuite2 = detectKemSuite(ciphertext) || { kem: noblePostQuantum.ml_kem768 };
                            ss = _dkSuite2.kem.decapsulate(ciphertext, dk.keys.kyber.secretKey);
                        } catch (e) {
                            addLog(`KEM decapsulation failed with ${dk.label}: ${e.message}`, 'info');
                            continue;
                        }

                        for (let i = 0; i < senderCandidates.length; i++) {
                            const candidate = senderCandidates[i];
                            const keyLabel = candidate.deviceId
                                ? `${candidate.email} (${candidate.deviceId})`
                                : (candidate.email || candidate.name || `key ${i + 1}`);

                            // Signature already verified before decrypt loop (Refinement 1)
                            // Skip redundant per-candidate verify for envelope-scope packages
                            try {
                                const payloadBytes = await aes.decrypt(encrypted, ss, iv);
                                const payload = JSON.parse(new TextDecoder().decode(payloadBytes));

                                // Success — log which keys worked
                                addLog(`✓ Decapsulated with ${dk.label}`, 'success');
                                addLog(`✓ Signature verified with ${keyLabel}`, 'success');
                                addLog('✓ AES-256-GCM decryption complete!', 'success');

                                if (dk.vaultEntry?.expires && new Date(dk.vaultEntry.expires) < new Date()) {
                                    addLog(`WARNING: Decryption used an EXPIRED key (expired ${dk.vaultEntry.expires}). Consider requesting re-encryption with current key.`, 'error');
                                }

                                const daysLeft = dk.vaultEntry?.expires
                                    ? Math.ceil((new Date(dk.vaultEntry.expires) - Date.now()) / 86400000)
                                    : null;
                                if (daysLeft !== null && daysLeft > 0 && daysLeft <= 30) {
                                    addLog(`Key expires in ${daysLeft} day(s) — extend or rotate to avoid losing access.`, 'error');
                                }

                                setRecipientPubKey(candidate);
                                setRecipientName(candidate.email || candidate.name || recipientName);
                                setDecryptedData(payload);
                                setStep(2);
                                decrypted = true;
                                break;
                            } catch (error) {
                                // AES-GCM auth tag failed — wrong shared secret, try next key
                            }
                        }

                        if (!decrypted) {
                            addLog(`Key ${dk.label}: decapsulation produced wrong shared secret (AES auth failed)`, 'info');
                        }
                    }

                    if (!decrypted) {
                        addLog('✗ Unable to verify/decrypt with any public key for selected sender', 'error');
                    }
                } catch (error) {
                    addLog(`✗ Error: ${error.message}`, 'error');
                    console.error('Decryption error:', error);
                } finally {
                    setProcessing(false);
                }
            };

            const reset = () => {
                setMode(null);
                setStep(0);
                setUserName('');
                setRecipientPubKey(null);
                setSenderKeyCandidates([]);
                setRecipientName('');
                setSubject('');
                setMessage('');
                setAttachments([]);
                setEncryptedPackage(null);
                setReceivedPackage(null);
                setDecryptedData(null);
                setLogs([]);
            };

            const logout = () => {
                setMyKeys(null);
                setTeamEmail('');
                setTeamMembers(null);
                sessionStorage.clear();
                setPhase('login');
            }

            const goToKeyManagement = () => {
                setMode(null);
                setStep(0);
                setPhase('identity');
            }

            const wrapContent = (content) => {
                return <div className="min-h-screen p-4">
                    {showLattice && (
                        <div className="lattice-container">
                            <LatticeCube size={200} colorBytes={latticeColorBytes} seedEmail={latticeSeedEmail} />
                        </div>
                    )}
                    <div className="flex items-center justify-center main-content">
                        <div className="max-w-2xl w-full">
                            <div className="text-center mb-8">
                                <h1 className="text-4xl font-bold text-gray-900 mb-2">🔐 Qrypto Trust Qrypto Chat</h1>
                                <p className="text-gray-500">PQC Zero Trust | Post-Quantum Encrypted File Transfer</p>
                                <div className="flex items-center justify-center gap-2 mt-2">
                                    <label className="text-gray-400 text-sm">Security Level:</label>
                                    <select
                                        value={activeSuiteName}
                                        onChange={e => { pqc.setSuite(e.target.value); setActiveSuiteName(e.target.value); addLog(`Switched to ${pqcSuites[e.target.value].label}: ${e.target.value}`, 'info'); }}
                                        className="text-xs border border-gray-300 rounded px-2 py-1 bg-white text-gray-700"
                                    >
                                        {Object.entries(pqcSuites).map(([name, s]) => (
                                            <option key={name} value={name}>{s.label} — {name} (NIST {s.security}-bit)</option>
                                        ))}
                                    </select>
                                </div>
                            </div>

                            {content}

                            <div className="mt-8 text-center">
                                <label className="flex items-center justify-center gap-2 text-gray-500 cursor-pointer">
                                    <input
                                        type="checkbox"
                                        checked={showLattice}
                                        onChange={e => setShowLattice(e.target.checked)}
                                        className="rounded"
                                    />
                                    Show Lattice Visualization
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            }



            // Login Phase
            if (phase === 'login') {
                return (
                    wrapContent(
                        <div className="space-y-4">
                            <h2 className="text-lg font-semibold text-gray-900">Sign into Team</h2>
                            <input
                                type="text"
                                placeholder="Your Team Email Address"
                                value={teamEmail}
                                disabled={processing}
                                onChange={e => setTeamEmail(e.target.value)}
                                onKeyDown={e => {
                                    if (e.key === 'Enter' && teamEmail.length > 0 && !processing) {
                                        e.preventDefault();
                                        signIn();
                                    }
                                }}
                                className="w-full bg-gray-50 text-gray-900 rounded-lg px-4 py-3 border border-gray-300 focus:border-blue-500 focus:outline-none"
                            />
                            <button
                                onClick={() => signIn()}
                                disabled={teamEmail.length === 0 || processing}
                                className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 text-white py-3 rounded-lg font-semibold transition-colors"
                            >
                                {processing ? '⏳ Please Wait...' : 'Sign-In'}
                            </button>
                        </div>
                    ));
            }

            // Code Entry Phase
            if (phase === 'code') {
                return (
                    wrapContent(
                        <div className="space-y-4">
                            <h2 className="text-lg font-semibold text-gray-900">Enter Validation Code:</h2>
                            <p>
                                <text className="text-gray-900">A confirmation email was sent to you at <b>{teamEmail}</b>. Enter the PIN code you received below:</text>
                            </p>
                            <input
                                type="text"
                                placeholder="Enter Validation Code"
                                value={pin}
                                disabled={processing}
                                onChange={e => setPin(e.target.value)}
                                onKeyDown={e => {
                                    if (e.key === 'Enter' && pin.length >= 6 && !processing) {
                                        e.preventDefault();
                                        validateCode();
                                    }
                                }}
                                className="w-full bg-gray-50 text-gray-900 rounded-lg px-4 py-3 border border-gray-300 focus:border-blue-500 focus:outline-none"
                            />
                            <button
                                onClick={() => validateCode()}
                                disabled={pin.length < 6 || processing}
                                className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 text-white py-3 rounded-lg font-semibold transition-colors"
                            >
                               Validate
                            </button>
                        </div>
                    ));
            }

            if (phase === 'identity') {
                const statusStyles = {
                    valid: 'bg-green-900/30 border border-green-600 text-green-600',
                    empty: 'bg-yellow-900/30 border border-yellow-600 text-yellow-300',
                    'missing-xq': 'bg-orange-900/30 border border-orange-600 text-orange-300',
                    'invalid-local': 'bg-red-900/30 border border-red-600 text-red-300',
                    mismatch: 'bg-red-900/30 border border-red-600 text-red-300',
                    unknown: 'bg-gray-50 border border-gray-300 text-gray-700'
                };

                return (
                    wrapContent(
                        <div className="space-y-4">
                            <h2 className="text-lg font-semibold text-gray-900">Keypair Management</h2>
                            <p className="text-gray-700">Signed in as <b>{teamEmail}</b> (Device ID: <b>{deviceId || 'Loading...'}</b>)</p>

                            <div className={`rounded-lg p-4 ${statusStyles[identityStatus.type] || statusStyles.unknown}`}>
                                <p className="font-semibold mb-1">Current Key Status</p>
                                <p>{identityStatus.message}</p>
                            </div>

                            <div className="grid md:grid-cols-2 gap-4">
                                <button
                                    onClick={refreshIdentityStatus}
                                    disabled={identityAction !== 'idle'}
                                    className="w-full bg-gray-100 hover:bg-gray-300 disabled:bg-gray-300 text-gray-900 py-3 rounded-lg font-semibold transition-colors"
                                >
                                    {identityAction === 'checking' ? '⏳ Checking...' : 'Check Current Key Status'}
                                </button>
                                <button
                                    onClick={generateAndStoreIdentity}
                                    disabled={identityAction !== 'idle'}
                                    className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 text-white py-3 rounded-lg font-semibold transition-colors"
                                >
                                    {identityAction === 'generating' ? '⏳ Generating...' : 'Generate Keypair'}
                                </button>
                            </div>

                            <div className="grid md:grid-cols-2 gap-4">
                                <button
                                    onClick={exportLocalKeypair}
                                    disabled={identityAction !== 'idle'}
                                    className="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-300 text-white py-3 rounded-lg font-semibold transition-colors"
                                >
                                    Export Keypair
                                </button>
                                <button
                                    onClick={() => importKeysInputRef.current?.click()}
                                    disabled={identityAction !== 'idle'}
                                    className="w-full bg-purple-600 hover:bg-purple-700 disabled:bg-gray-300 text-white py-3 rounded-lg font-semibold transition-colors"
                                >
                                    {identityAction === 'importing' ? '⏳ Importing...' : 'Import Keypair'}
                                </button>
                                <input
                                    ref={importKeysInputRef}
                                    type="file"
                                    accept=".json"
                                    onChange={importLocalKeypair}
                                    className="hidden"
                                />
                            </div>

                            <button
                                onClick={deleteAllIdentityKeysInXQ}
                                disabled={identityAction !== 'idle'}
                                className="w-full bg-red-600 hover:bg-red-700 disabled:bg-gray-300 text-white py-3 rounded-lg font-semibold transition-colors"
                            >
                                {identityAction === 'deleting' ? '⏳ Deleting...' : 'Delete All My XQ Keys'}
                            </button>

                            {/* Key Vault Panel */}
                            {(() => {
                                const vault = _mw.getKeyVault();
                                const expiring = _mw.vaultExpiring(30);
                                if (vault.length === 0 && expiring.length === 0) return null;
                                return (
                                    <div className="border border-gray-200 rounded-lg p-4 bg-gray-50">
                                        <h3 className="text-sm font-semibold text-gray-700 mb-2">Key Vault ({vault.length} key{vault.length !== 1 ? 's' : ''})</h3>
                                        {expiring.length > 0 && (
                                            <div className="bg-amber-50 border border-amber-200 rounded p-2 mb-2 text-xs text-amber-700">
                                                {expiring.length} key(s) expiring within 30 days
                                            </div>
                                        )}
                                        <div className="space-y-2 max-h-40 overflow-y-auto">
                                            {vault.map(entry => {
                                                const daysLeft = entry.expires ? Math.ceil((new Date(entry.expires) - Date.now()) / 86400000) : null;
                                                const isExpired = daysLeft !== null && daysLeft <= 0;
                                                const isExpiring = daysLeft !== null && daysLeft > 0 && daysLeft <= 30;
                                                return (
                                                    <div key={entry.keyId} className={`flex items-center justify-between text-xs p-2 rounded ${entry.revoked ? 'bg-red-50 border border-red-200' : entry.active ? 'bg-green-50 border border-green-200' : 'bg-gray-100 border border-gray-200'}`}>
                                                        <div>
                                                            <span className="font-medium">{entry.deviceId}</span>
                                                            <span className="text-gray-400 ml-1">({entry.keyId?.slice(0,8)})</span>
                                                            {entry.active && <span className="text-green-600 ml-1">active</span>}
                                                            {entry.revoked && <span className="text-red-600 ml-1">revoked {new Date(entry.revoked).toLocaleDateString()}</span>}
                                                            {isExpired && !entry.revoked && <span className="text-red-600 ml-1">EXPIRED</span>}
                                                            {isExpiring && !entry.revoked && <span className="text-amber-600 ml-1">{daysLeft}d left</span>}
                                                        </div>
                                                        {!entry.revoked && (
                                                            <div className="flex gap-1">
                                                                <select
                                                                    className="text-xs border rounded px-1 py-0.5"
                                                                    defaultValue=""
                                                                    onChange={e => {
                                                                        if (e.target.value) {
                                                                            const newExp = _mw.vaultExtend(entry.keyId, parseInt(e.target.value));
                                                                            if (newExp) addLog(`Key ${entry.keyId.slice(0,8)} extended to ${new Date(newExp).toLocaleDateString()}`, 'success');
                                                                            e.target.value = '';
                                                                        }
                                                                    }}
