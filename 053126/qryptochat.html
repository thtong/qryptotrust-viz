                                                                >
                                                                    <option value="">Extend...</option>
                                                                    <option value="30">+30 days</option>
                                                                    <option value="60">+60 days</option>
                                                                    <option value="90">+90 days</option>
                                                                    <option value="365">+365 days</option>
                                                                </select>
                                                                <button
                                                                    onClick={() => {
                                                                        if (window.confirm(`Revoke key ${entry.keyId.slice(0,8)} for device ${entry.deviceId}? Files encrypted with this key will become permanently inaccessible.`)) {
                                                                            _mw.vaultRevoke(entry.keyId);
                                                                            addLog(`Key ${entry.keyId.slice(0,8)} REVOKED`, 'error');
                                                                        }
                                                                    }}
                                                                    className="text-red-500 hover:text-red-700 px-1"
                                                                    title="Revoke key"
                                                                >
                                                                    Revoke
                                                                </button>
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                );
                            })()}

                            <button
                                onClick={continueToApp}
                                disabled={identityAction !== 'idle' || identityStatus.type !== 'valid' || !myKeys}
                                className="w-full bg-green-600 hover:bg-green-700 disabled:bg-gray-300 text-white py-3 rounded-lg font-semibold transition-colors"
                            >
                                {identityAction === 'continuing' ? '⏳ Continuing...' : 'Continue'}
                            </button>
                        </div>
                    )
                );
            }

            // Ready Phase — Qrypto Chat
            if (mode === 'chat') {
                const chatEmailValid = recipientEmailInput.length > 3 && recipientEmailInput.includes('@');

                // Chat message display — appends to the chat area DOM directly
                const appendChatMsg = function(dir, text, sender, device, time) {
                    var area = document.getElementById('chatMsgArea');
                    if (!area) return;
                    var wrapper = document.createElement('div');
                    wrapper.style.cssText = 'display:flex;' + (dir === 'out' ? 'justify-content:flex-end;' : 'justify-content:flex-start;') + 'margin-bottom:12px;';
                    var bubble = document.createElement('div');
                    bubble.style.cssText = 'max-width:70%;border-radius:12px;padding:8px 14px;box-shadow:0 1px 2px rgba(0,0,0,0.05);' +
                        (dir === 'out' ? 'background:#111827;color:#f3f4f6;' : 'background:#fff;border:1px solid #e5e7eb;color:#111827;');
                    var header = document.createElement('div');
                    header.style.cssText = 'font-size:11px;margin-bottom:4px;display:flex;gap:6px;align-items:center;';
                    header.innerHTML = '<span style="font-weight:600;' + (dir === 'out' ? 'color:#60a5fa' : 'color:#4b5563') + '">' + (dir === 'out' ? 'You' : (sender || 'peer')) + '</span>' +
                        '<span style="color:#9ca3af">[' + (device || '?') + ']</span>' +
                        '<span style="color:#22c55e;font-size:10px">PQC</span>' +
                        '<span style="color:#9ca3af">' + (time || new Date().toLocaleTimeString()) + '</span>';
                    var body = document.createElement('div');
                    body.style.cssText = 'font-size:14px;white-space:pre-wrap;word-break:break-word;';
                    body.textContent = text;
                    bubble.appendChild(header);
                    bubble.appendChild(body);
                    wrapper.appendChild(bubble);
                    area.appendChild(wrapper);
                    area.scrollTop = area.scrollHeight;
                };

                // ─── v=2.1p / v=2.1gp canonical helpers (participant typing) ─────
                // Byte-equivalence anchor for cross-machine sig verification (T-AGENT-1).
                // Mirrors PqcZap.Sft.V21.canonical_bytes/1: explicit ordered tuples,
                // raw-string injection for nested participant blocks (no Map iteration order).
                // Field order MUST match Elixir-side counterpart exactly.
                function _participantCanonical(p) {
                    var pt = (p && p.participant_type) || '';
                    var aid = (p && p.agent_id) || '';
                    var pid = (p && p.program_id) || '';
                    return '{"participant_type":' + JSON.stringify(pt) +
                           ',"agent_id":' + JSON.stringify(aid) +
                           ',"program_id":' + JSON.stringify(pid) + '}';
                }
                // _chatCanonical accepts an array of entries:
                //   ['k', value]                -> JSON.stringify(value)
                //   [':raw', 'k', rawJsonStr]   -> rawJsonStr injected verbatim
                function _chatCanonical(fields) {
                    var parts = fields.map(function(f) {
                        if (f[0] === ':raw') {
                            return JSON.stringify(f[1]) + ':' + f[2];
                        }
                        return JSON.stringify(f[0]) + ':' + JSON.stringify(f[1]);
                    });
                    return '{' + parts.join(',') + '}';
                }
                function _normalizeParticipant(p) {
                    if (!p) return null;
                    return {
                        participant_type: typeof p.participant_type === 'string' ? p.participant_type : '',
                        agent_id: typeof p.agent_id === 'string' ? p.agent_id : '',
                        program_id: typeof p.program_id === 'string' ? p.program_id : ''
                    };
                }
                // Default sender_participant for browser-originated chat (human user).
                // Override via window._chatSenderParticipant for agent-driven shells.
                function _resolveSenderParticipant() {
                    return _normalizeParticipant(window._chatSenderParticipant) ||
                           { participant_type: 'human', agent_id: '', program_id: '' };
                }

                // T-AGENT-0 smoke: build → sign → verify → tamper for v=2.1p AND v=2.1gp.
                // Run from devtools: await window._tAgent0Smoke()
                // Returns { pass: bool, results: [...] }. Logs each step.
                window._tAgent0Smoke = async function _tAgent0Smoke() {
                    var dsa = noblePostQuantum.ml_dsa65;
                    var kem = noblePostQuantum.ml_kem768;
                    var enc = new TextEncoder();
                    var results = [];

                    function log(name, ok, detail) {
                        results.push({ name: name, pass: !!ok, detail: detail || '' });
                        console.log((ok ? '  ✓' : '  ✗') + ' ' + name + (detail ? ' — ' + detail : ''));
                    }

                    // Sign canonical → return sig bytes.
                    async function signCanonical(canonical, sk) {
                        var d = await crypto.subtle.digest('SHA-256', enc.encode(canonical));
                        return dsa.sign(new Uint8Array(d), sk);
                    }
                    async function verifyCanonical(canonical, sig, pk) {
                        var d = await crypto.subtle.digest('SHA-256', enc.encode(canonical));
                        return dsa.verify(sig, new Uint8Array(d), pk);
                    }

                    // -- Test rig keys --
                    var senderKp = dsa.keygen();
                    var senderPkB64 = cryptoUtils.bytesToBase64(senderKp.publicKey);
                    var senderFp = cryptoUtils.fingerprint(senderKp.publicKey);
                    var rcptKemKp = kem.keygen();
                    var encR = kem.encapsulate(rcptKemKp.publicKey);
                    var kemCtB64 = cryptoUtils.bytesToBase64(encR.cipherText);
                    var ivB64 = cryptoUtils.bytesToBase64(crypto.getRandomValues(new Uint8Array(12)));
                    var encB64 = cryptoUtils.bytesToBase64(crypto.getRandomValues(new Uint8Array(64)));
                    var ts = new Date().toISOString();
                    var rcptFp = cryptoUtils.fingerprint(rcptKemKp.publicKey);

                    console.log('=== T-AGENT-0 v=2.1p / v=2.1gp smoke ===');

                    // Case 1: v=2.1p human↔human (all empty participant fields)
                    var sp1 = { participant_type: 'human', agent_id: '', program_id: '' };
                    var rp1 = { participant_type: 'human', agent_id: '', program_id: '' };
                    var c1 = _chatCanonical([
                        ['v', '2.1p'],
                        ['senderFp', senderFp],
                        ['senderDsaPk', senderPkB64],
                        [':raw', 'sender_participant', _participantCanonical(sp1)],
                        ['recipientFp', rcptFp],
                        [':raw', 'recipient_participant', _participantCanonical(rp1)],
                        ['kemCt', kemCtB64],
                        ['iv', ivB64],
                        ['enc', encB64],
                        ['ts', ts]
                    ]);
                    var sig1 = await signCanonical(c1, senderKp.secretKey);
                    var v1 = await verifyCanonical(c1, sig1, senderKp.publicKey);
                    log('v=2.1p human↔human sign+verify', v1, c1.length + 'B canonical');

                    // Case 2: v=2.1p human→agent (participant info populated)
                    var sp2 = { participant_type: 'human', agent_id: '', program_id: '' };
                    var rp2 = { participant_type: 'agent', agent_id: 'test-agent', program_id: 'claude-code' };
                    var c2 = _chatCanonical([
                        ['v', '2.1p'],
                        ['senderFp', senderFp],
                        ['senderDsaPk', senderPkB64],
                        [':raw', 'sender_participant', _participantCanonical(sp2)],
                        ['recipientFp', rcptFp],
                        [':raw', 'recipient_participant', _participantCanonical(rp2)],
                        ['kemCt', kemCtB64],
                        ['iv', ivB64],
                        ['enc', encB64],
                        ['ts', ts]
                    ]);
                    var sig2 = await signCanonical(c2, senderKp.secretKey);
                    var v2 = await verifyCanonical(c2, sig2, senderKp.publicKey);
                    log('v=2.1p human→agent sign+verify', v2, c2.length + 'B canonical');

                    // Case 3: v=2.1p tamper recipient_participant.participant_type post-sig
                    var rp3 = { participant_type: 'agent', agent_id: 'test-agent', program_id: 'claude-code' };
                    var rp3Tampered = { participant_type: 'service', agent_id: 'test-agent', program_id: 'claude-code' };
                    var cBase = _chatCanonical([
                        ['v', '2.1p'],
                        ['senderFp', senderFp],
                        ['senderDsaPk', senderPkB64],
                        [':raw', 'sender_participant', _participantCanonical(sp2)],
                        ['recipientFp', rcptFp],
                        [':raw', 'recipient_participant', _participantCanonical(rp3)],
                        ['kemCt', kemCtB64],
                        ['iv', ivB64],
                        ['enc', encB64],
                        ['ts', ts]
                    ]);
                    var sigBase = await signCanonical(cBase, senderKp.secretKey);
                    var cTamp = _chatCanonical([
                        ['v', '2.1p'],
                        ['senderFp', senderFp],
                        ['senderDsaPk', senderPkB64],
                        [':raw', 'sender_participant', _participantCanonical(sp2)],
                        ['recipientFp', rcptFp],
                        [':raw', 'recipient_participant', _participantCanonical(rp3Tampered)],
                        ['kemCt', kemCtB64],
                        ['iv', ivB64],
                        ['enc', encB64],
                        ['ts', ts]
                    ]);
                    var vTamp = await verifyCanonical(cTamp, sigBase, senderKp.publicKey);
                    log('v=2.1p tamper participant_type → sig fails (expect false)', !vTamp, 'verify=' + vTamp);

                    // Case 4: v=2.1gp two-recipient group with one agent + one human
                    var rcpt2KemKp = kem.keygen();
                    var enc2 = kem.encapsulate(rcpt2KemKp.publicKey);
                    var rec1 = {
                        fingerprint: rcptFp,
                        kemCt: kemCtB64,
                        wrap: cryptoUtils.bytesToBase64(crypto.getRandomValues(new Uint8Array(32))),
                        participant: { participant_type: 'human', agent_id: '', program_id: '' }
                    };
                    var rec2 = {
                        fingerprint: cryptoUtils.fingerprint(rcpt2KemKp.publicKey),
                        kemCt: cryptoUtils.bytesToBase64(enc2.cipherText),
                        wrap: cryptoUtils.bytesToBase64(crypto.getRandomValues(new Uint8Array(32))),
                        participant: { participant_type: 'agent', agent_id: 'ryzen-claude-jnhil', program_id: 'claude-code' }
                    };
                    var recsRaw = [rec1, rec2].map(function(r) {
                        return _chatCanonical([
                            ['fingerprint', r.fingerprint],
                            ['kemCt', r.kemCt],
                            ['wrap', r.wrap],
                            [':raw', 'participant', _participantCanonical(r.participant)]
                        ]);
                    });
                    var c4 = _chatCanonical([
                        ['v', '2.1gp'],
                        ['senderFp', senderFp],
                        ['senderDsaPk', senderPkB64],
                        [':raw', 'sender_participant', _participantCanonical(sp1)],
                        [':raw', 'recipients', '[' + recsRaw.join(',') + ']'],
                        ['iv', ivB64],
                        ['enc', encB64],
                        ['ts', ts]
                    ]);
                    var sig4 = await signCanonical(c4, senderKp.secretKey);
                    var v4 = await verifyCanonical(c4, sig4, senderKp.publicKey);
                    log('v=2.1gp 2-rcpt mixed sign+verify', v4, c4.length + 'B canonical');

                    // Case 5: v=2.1gp tamper rec2.participant.agent_id post-sig
                    var rec2T = Object.assign({}, rec2, {
                        participant: { participant_type: 'agent', agent_id: 'evil-agent', program_id: 'claude-code' }
                    });
                    var recsRawT = [rec1, rec2T].map(function(r) {
                        return _chatCanonical([
                            ['fingerprint', r.fingerprint],
                            ['kemCt', r.kemCt],
                            ['wrap', r.wrap],
                            [':raw', 'participant', _participantCanonical(r.participant)]
                        ]);
                    });
                    var c5T = _chatCanonical([
                        ['v', '2.1gp'],
                        ['senderFp', senderFp],
                        ['senderDsaPk', senderPkB64],
                        [':raw', 'sender_participant', _participantCanonical(sp1)],
                        [':raw', 'recipients', '[' + recsRawT.join(',') + ']'],
                        ['iv', ivB64],
                        ['enc', encB64],
                        ['ts', ts]
                    ]);
                    var v5 = await verifyCanonical(c5T, sig4, senderKp.publicKey);
                    log('v=2.1gp tamper recipient agent_id → sig fails (expect false)', !v5, 'verify=' + v5);

                    var allPass = results.every(function(r) { return r.pass; });
                    console.log('=== ' + (allPass ? 'PASS' : 'FAIL') + ' (' +
                        results.filter(function(r){return r.pass;}).length + '/' + results.length + ') ===');
                    return { pass: allPass, results: results };
                };

                // Decrypt incoming encrypted chat package (v2.1: A5 nonce + A8 full-envelope sig)
                // v2.1g group chat: recipients[] carries per-recipient kemCt + XOR-wrapped CEK.
                //   CEK (random 32B) = AES-256-GCM content key for pkg.enc
                //   For each recipient: kemCt_i = ML-KEM-encapsulate(recipient_i.kemPk) -> ephemeral_ss_i
                //                       wrap_i  = CEK XOR ephemeral_ss_i (one-time-pad, both 32B)
                //   Recipient decap(kemCt_i, their_sk) -> ephemeral_ss_i -> CEK = wrap_i XOR ephemeral_ss_i
                //   ML-DSA sig over SHA-256(canonical including ALL recipients[] entries).
                async function decryptChatPkgGroup(pkg) {
                    if (!myKeys || !myKeys.kyber || !myKeys.kyber.secretKey || !myKeys.dilithium || !myKeys.dilithium.publicKey) {
                        throw new Error('No local keys');
                    }
                    // Accept legacy v=2.1g OR participant-typed v=2.1gp.
                    if (pkg.v !== '2.1g' && pkg.v !== '2.1gp') {
                        throw new Error('Envelope v=' + (pkg.v || 'unknown') + ' rejected (v2.1g/2.1gp required)');
                    }
                    if (!Array.isArray(pkg.recipients) || pkg.recipients.length === 0) {
                        throw new Error('No recipients[] in envelope');
                    }

                    var myFp = cryptoUtils.fingerprint(myKeys.dilithium.publicKey);
                    var mine = pkg.recipients.find(function(r) { return r.fingerprint === myFp; });
                    if (!mine) throw new Error('Not a recipient of this group message');

                    var iv = cryptoUtils.base64ToBytes(pkg.iv);
                    var enc = cryptoUtils.base64ToBytes(pkg.enc);
                    var sig = cryptoUtils.base64ToBytes(pkg.sig);
                    var senderDsa = cryptoUtils.base64ToBytes(pkg.sender.dsaPk);
                    var myKemCt = cryptoUtils.base64ToBytes(mine.kemCt);
                    var wrap = cryptoUtils.base64ToBytes(mine.wrap);
                    if (wrap.length !== 32) throw new Error('wrap length != 32');

                    var kemImpl = (myKemCt.length === 1568) ? noblePostQuantum.ml_kem1024
                        : (myKemCt.length === 768) ? noblePostQuantum.ml_kem512
                        : noblePostQuantum.ml_kem768;
                    var dsaImpl = (senderDsa.length === 2592) ? noblePostQuantum.ml_dsa87
                        : (senderDsa.length === 1312) ? noblePostQuantum.ml_dsa44
                        : noblePostQuantum.ml_dsa65;

                    // A8 canonical reconstruction.
                    //  v=2.1g  : legacy — sig over plain-object canonical (no participant fields).
                    //  v=2.1gp : participant-typed — sig over ordered-tuple canonical with
                    //            sender_participant (raw) + recipients[].participant (raw) blocks.
                    var canonicalStr;
                    if (pkg.v === '2.1gp') {
                        var senderP = _normalizeParticipant(pkg.sender && pkg.sender.participant);
                        if (!senderP) throw new Error('v=2.1gp missing sender.participant');
                        var recipientsCanonicalRaw = pkg.recipients.map(function(r) {
                            var p = _normalizeParticipant(r.participant);
                            if (!p) throw new Error('v=2.1gp recipient ' + r.fingerprint + ' missing participant');
                            // Per-recipient ordered tuple: fingerprint, kemCt, wrap, participant (raw).
                            return _chatCanonical([
                                ['fingerprint', r.fingerprint],
                                ['kemCt', r.kemCt],
                                ['wrap', r.wrap],
                                [':raw', 'participant', _participantCanonical(p)]
                            ]);
                        });
                        var recipientsArrayJoined = '[' + recipientsCanonicalRaw.join(',') + ']';
                        canonicalStr = _chatCanonical([
                            ['v', pkg.v],
                            ['senderFp', pkg.sender.fingerprint],
                            ['senderDsaPk', pkg.sender.dsaPk],
                            [':raw', 'sender_participant', _participantCanonical(senderP)],
                            [':raw', 'recipients', recipientsArrayJoined],
                            ['iv', pkg.iv],
                            ['enc', pkg.enc],
                            ['ts', pkg.ts]
                        ]);
                    } else {
                        // Legacy v=2.1g (preserve existing byte-equivalence)
                        var recipientsCanonical = pkg.recipients.map(function(r) {
                            return { fingerprint: r.fingerprint, kemCt: r.kemCt, wrap: r.wrap };
                        });
                        canonicalStr = JSON.stringify({
                            v: pkg.v,
                            senderFp: pkg.sender.fingerprint,
                            senderDsaPk: pkg.sender.dsaPk,
                            recipients: recipientsCanonical,
                            iv: pkg.iv,
                            enc: pkg.enc,
                            ts: pkg.ts
                        });
                    }
                    var digestBuf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(canonicalStr));
                    var signedBytes = new Uint8Array(digestBuf);
                    var sigValid = dsaImpl.verify(sig, signedBytes, senderDsa);
                    if (!sigValid) throw new Error('Signature invalid (A8 group scope)');

                    var ephemeralSs = kemImpl.decapsulate(myKemCt, myKeys.kyber.secretKey);
                    if (ephemeralSs.length !== 32) throw new Error('ephemeralSs length != 32');
                    var cek = new Uint8Array(32);

                    }
                    if (window._seenNonces.has(payload.nonce)) throw new Error('Replay detected (A5)');
                    var msgTs = new Date(payload.ts).getTime();
                    if (Math.abs(now - msgTs) > 86400000) throw new Error('ts outside 24h window (A5)');
                    window._seenNonces.set(payload.nonce, now + 86400000);

                }

                async function decryptChatPkg(pkg) {
                    if (!myKeys || !myKeys.kyber || !myKeys.kyber.secretKey) {
                        throw new Error('No local keys');
                    }
                    // Accept legacy v=2.1 OR participant-typed v=2.1p.
                    if (pkg.v !== '2.1' && pkg.v !== '2.1p') {

                    }

                    var iv = cryptoUtils.base64ToBytes(pkg.iv);
                    var enc = cryptoUtils.base64ToBytes(pkg.enc);
                    var sig = cryptoUtils.base64ToBytes(pkg.sig);
                    var senderDsa = cryptoUtils.base64ToBytes(pkg.sender.dsaPk);

                    var kemImpl = (kemCt.length === 1568) ? noblePostQuantum.ml_kem1024
                        : (kemCt.length === 768) ? noblePostQuantum.ml_kem512
                        : noblePostQuantum.ml_kem768;

                        if (!recipientP) throw new Error('v=2.1p missing recipient.participant');

                            ['v', pkg.v],
                            ['senderFp', pkg.sender.fingerprint],
                            ['senderDsaPk', pkg.sender.dsaPk],
                            [':raw', 'sender_participant', _participantCanonical(senderP)],
                            ['recipientFp', pkg.recipient.fingerprint],
                            [':raw', 'recipient_participant', _participantCanonical(recipientP)],
                            ['kemCt', pkg.kemCt],
                            ['iv', pkg.iv],
                            ['enc', pkg.enc],
                            ['ts', pkg.ts]
                        ]);
                    } else {
                        canonicalStr = JSON.stringify({
                            v: pkg.v,
                            senderFp: pkg.sender.fingerprint,
                            senderDsaPk: pkg.sender.dsaPk,
                            recipientFp: pkg.recipient.fingerprint,
                            kemCt: pkg.kemCt,
                            iv: pkg.iv,
                            enc: pkg.enc,
                            ts: pkg.ts
                        });
                    }
                    var digestBuf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(canonicalStr));
                    var signedBytes = new Uint8Array(digestBuf);
                    var sigValid = dsaImpl.verify(sig, signedBytes, senderDsa);
                    if (!sigValid) throw new Error('Signature invalid (A8 scope)');

                    var sharedSecret = kemImpl.decapsulate(kemCt, myKeys.kyber.secretKey);
                    var ptBytes = await aes.decrypt(enc, sharedSecret, iv);
                    var payload = JSON.parse(new TextDecoder().decode(ptBytes));

                        if (entry[1] < now) window._seenNonces.delete(entry[0]);
                    }

                        throw new Error('Replay detected (A5)');
                    }
                    var msgTs = new Date(payload.ts).getTime();
                    if (Math.abs(now - msgTs) > 86400000) {
                        throw new Error('ts outside 24h window (A5)');
                    }

                }

                // ─── SFT v2.1 in-chat file transfer ───────────────────────────────
                // Per-file: one ML-KEM-768 encap + one ML-DSA-65 sig over canonical opener.
                // Per-chunk: AES-256-GCM with deterministic IV (iv_base ‖ seq_be) and
                // AAD (session_id ‖ seq_be). Wire types: sft_opener / sft_chunk / sft_complete.
                // Spec: lib/pqc_zap/sft/v21.ex (Elixir codec) + Downloads/SFT_v2.1_Session_Transfer_Spec.md
                window._sftSessions = window._sftSessions || new Map();
                window._sftSeenSessions = window._sftSeenSessions || new Set();

                // v2.1m meta block field order — DETERMINISTIC, must match
                // PqcZap.Sft.V21.@meta_field_order on the Elixir side.
                const _SFT_META_FIELD_ORDER = ['machine_id','phoenix_instance_id','boot_nonce','user_id','endpoint','send_ts','zt_v'];

                const _sftEncodeMetaCanonical = function(meta) {
                    if (!meta) return null;
                    var parts = _SFT_META_FIELD_ORDER.map(function(k) {
                        var v = (meta[k] != null) ? String(meta[k]) : '';
                        return JSON.stringify(k) + ':' + JSON.stringify(v);
                    });
                    return '{' + parts.join(',') + '}';
                };

                const _sftCanonicalOpener = function(pkg) {
                    // Field order MUST match Elixir V21.canonical_bytes/1 exactly for sig verify.
                    // For v=2.1m, meta block inserted between recipientFp and fileName.
                    var head = [
                        ['type', 'sft_opener'],
                        ['v', pkg.v],
                        ['session_id', pkg.session_id],
                        ['senderFp', pkg.senderFp],
                        ['senderDsaPk', pkg.senderDsaPk],
                        ['recipientFp', pkg.recipientFp || '']
                    ];
                    var tail = [
                        ['fileName', pkg.fileName],
                        ['fileSize', pkg.fileSize],
                        ['fileSha256', pkg.fileSha256],
                        ['chunkSize', pkg.chunkSize],
                        ['chunkCount', pkg.chunkCount],
                        ['kemCt', pkg.kemCt],
                        ['iv_base', pkg.iv_base],
                        ['aes_suite', pkg.aes_suite || 'AES-256-GCM'],
                        ['kem_suite', pkg.kem_suite || 'ML-KEM-768'],
                        ['sig_suite', pkg.sig_suite || 'ML-DSA-65'],
                        ['ts', pkg.ts]
                    ];
                    var encodeKv = function(f) { return JSON.stringify(f[0]) + ':' + JSON.stringify(f[1]); };
                    var headJson = head.map(encodeKv);
                    var tailJson = tail.map(encodeKv);
                    var middle = [];
                    if (pkg.v === '2.1m') {
                        var metaCanonical = _sftEncodeMetaCanonical(pkg.meta || {});
                        middle.push(JSON.stringify('meta') + ':' + metaCanonical);
                    }
                    return '{' + headJson.concat(middle).concat(tailJson).join(',') + '}';
                };

                async function handleSftOpener(pkg) {
                    if (!myKeys || !myKeys.kyber || !myKeys.kyber.secretKey) throw new Error('No local keys');
                    if (pkg.v !== '2.1' && pkg.v !== '2.1m') throw new Error('SFT envelope v=' + pkg.v + ' rejected (v2.1 or v2.1m required)');
                    if (window._sftSeenSessions.has(pkg.session_id)) throw new Error('Session replay (seen session_id)');

                    var senderDsa = cryptoUtils.base64ToBytes(pkg.senderDsaPk);
                    var sig = cryptoUtils.base64ToBytes(pkg.sig);
                    var kemCt = cryptoUtils.base64ToBytes(pkg.kemCt);
                    var ivBase = cryptoUtils.base64ToBytes(pkg.iv_base);

                    var dsaImpl = (senderDsa.length === 2592) ? noblePostQuantum.ml_dsa87
                        : (senderDsa.length === 1312) ? noblePostQuantum.ml_dsa44
                        : noblePostQuantum.ml_dsa65;
                    var kemImpl = (kemCt.length === 1568) ? noblePostQuantum.ml_kem1024
                        : (kemCt.length === 768) ? noblePostQuantum.ml_kem512
                        : noblePostQuantum.ml_kem768;

                    var canonical = _sftCanonicalOpener(pkg);
                    var digestBuf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(canonical));
                    var sigValid = dsaImpl.verify(sig, new Uint8Array(digestBuf), senderDsa);
                    if (!sigValid) throw new Error('SFT sig invalid (canonical opener)');

                    var ss = kemImpl.decapsulate(kemCt, myKeys.kyber.secretKey);
                    if (ss.length !== 32) throw new Error('SFT KEM ss length != 32');

                    window._sftSessions.set(pkg.session_id, {
                        ss: ss, iv_base: ivBase,
                        file_name: pkg.fileName, file_size: pkg.fileSize,
                        file_sha256: pkg.fileSha256, chunk_size: pkg.chunkSize,
                        chunk_count: pkg.chunkCount, ts: pkg.ts,
                        sender_fp: pkg.senderFp, chunks: new Map()
                    });
                    window._sftSeenSessions.add(pkg.session_id);
                    addLog('SFT opener verified (' + pkg.fileName + ', ' + pkg.fileSize + 'B, ' + pkg.chunkCount + ' chunks)', 'info');
                    return { fileName: pkg.fileName, chunkCount: pkg.chunkCount };
                }

                async function handleSftChunk(pkg) {
                    var sess = window._sftSessions.get(pkg.session_id);
                    if (!sess) throw new Error('SFT chunk for unknown session');
                    var seq = pkg.seq;
                    if (seq < 0 || seq >= sess.chunk_count) throw new Error('SFT chunk seq out of range');
                    if (sess.chunks.has(seq)) return { seq: seq, dup: true };

                    // iv = iv_base (8B) || seq_be (4B)
                    var iv = new Uint8Array(12);
                    iv.set(sess.iv_base, 0);
                    new DataView(iv.buffer).setUint32(8, seq, false);

                    // aad = session_id (16B) || seq_be (4B)
                    var sidBytes = cryptoUtils.base64ToBytes(pkg.session_id);
                    var aad = new Uint8Array(sidBytes.length + 4);
                    aad.set(sidBytes, 0);
                    new DataView(aad.buffer).setUint32(sidBytes.length, seq, false);

                    var ct = cryptoUtils.base64ToBytes(pkg.ct);
                    var key = await crypto.subtle.importKey('raw', sess.ss, { name: 'AES-GCM' }, false, ['decrypt']);
                    var ptBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv, additionalData: aad }, key, ct);
                    var pt = new Uint8Array(ptBuf);
                    sess.chunks.set(seq, pt);

                // ── 3-light ZAP-wrap classifier (browser-side, matches Elixir PqcZap.ZapWrap.classify_status/1) ──
                // Per Jason's 2026-04-27 spec: backward compat is the point of the onion. Most legacy crypto
                // wrapped successfully = YELLOW. RED is reserved for the catastrophe case (classical inner +
                // wrap_zt missing). Token sets must match Elixir lib/pqc_zap/zap_wrap.ex exactly.
                const _ZAP_YELLOW_TOKENS = ['rsa','rainbow','ed25519','ecdsa','secp256','p256','p384','p521','x25519','dh','tls12','tls11','openpgp/rsa','openpgp/dsa','signal-classical','x3dh-classical','ecies-classical','aes-with-rsa','dsa-only','ecdsa-only','rsa-pss','rsa-only'];
                const _ZAP_GREEN_TOKENS  = ['openpgp-hybrid','signal-pqc','tls13-hybrid-mlkem','tls13-hybrid','ml-kem','mlkem','ml-dsa','mldsa','sphincs-plus','sphincs+','slh-dsa','falcon','kyber','dilithium','hqc','uov'];
                const _ZAP_OPAQUE_TOKENS = ['opaque','raw','aes-128-gcm','aes-256-gcm','aes-512-gcm','chacha20'];

                const _zapClassifyStatus = function(env) {
                    var algo = (env && env.inner_algo ? String(env.inner_algo) : '').toLowerCase();
                    var wzt = env && env.wrap_zt ? env.wrap_zt : {};
                    var hasZt = wzt && typeof wzt === 'object' && wzt.machine_id && wzt.machine_id.length > 0;
                    var hits = function(list) { return list.some(function(t) { return algo.indexOf(t) !== -1; }); };
                    var classical = hits(_ZAP_YELLOW_TOKENS);
                    var pq = hits(_ZAP_GREEN_TOKENS);
                    var opaque = hits(_ZAP_OPAQUE_TOKENS);
                    if (classical && !hasZt) return { color: 'red',    dot: '🔴', reason: "Inner '" + algo + "' is classical AND wrap_zt missing — no PQ attribution chain. UNTRUSTED." };
                    if (classical)           return { color: 'yellow', dot: '🟡', reason: "Inner '" + algo + "' is classical (RSA/Rainbow/ECDSA/etc.) — outer DSA wrap successful, source crypto at risk." };
                    if (!hasZt)              return { color: 'yellow', dot: '🟡', reason: 'wrap_zt missing or empty — outer sig holds but ZAP forensic attribution incomplete' };
                    if (pq)                  return { color: 'green',  dot: '🟢', reason: "Inner '" + algo + "' is post-quantum + wrap_zt present" };
                    if (opaque)              return { color: 'green',  dot: '🟢', reason: "Inner '" + algo + "' is opaque/symmetric — riding on outer SFT crypto" };
                    return { color: 'yellow', dot: '🟡', reason: "Inner '" + algo + "' unclassified — failing safe to caution" };
                };

                async function handleSftComplete(pkg) {
                    var sess = window._sftSessions.get(pkg.session_id);
                    if (!sess) throw new Error('SFT complete for unknown session');
                    if (sess.chunks.size !== sess.chunk_count) {
                        throw new Error('SFT incomplete: ' + sess.chunks.size + '/' + sess.chunk_count + ' chunks');
                    }
                    // Reassemble in seq order
                    var total = 0;
                    for (var s = 0; s < sess.chunk_count; s++) total += sess.chunks.get(s).length;
                    var assembled = new Uint8Array(total);
                    var off = 0;
                    for (var s = 0; s < sess.chunk_count; s++) {
                        var c = sess.chunks.get(s);
                        assembled.set(c, off);
                        off += c.length;
                    }
                    if (assembled.length !== sess.file_size) throw new Error('Assembled size mismatch');
                    var shaBuf = await crypto.subtle.digest('SHA-256', assembled);
                    var shaB64 = cryptoUtils.bytesToBase64(new Uint8Array(shaBuf));
                    if (shaB64 !== sess.file_sha256) throw new Error('SHA-256 mismatch (final integrity)');

                    var ztStatus = null;
                    if (sess.file_name && sess.file_name.toLowerCase().endsWith('.zapwrap')) {
                        try {
                            var wrapJson = new TextDecoder().decode(assembled);
                            var env = JSON.parse(wrapJson);
                            if (env && env.v === 'zap-wrap-1' && env.inner_payload_b64 && env.inner_sha256) {

                                } else {
                                    ztStatus = _zapClassifyStatus(env);
                                    ztStatus.inner_size = env.inner_size;
                                    ztStatus.inner_algo = env.inner_algo;
                                }

                        }
                    }

                    var blob = new Blob([assembled], { type: 'application/octet-stream' });
                    var url = URL.createObjectURL(blob);

                    a.href = url; a.download = sess.file_name;
                    document.body.appendChild(a); a.click();
                    URL.revokeObjectURL(url); a.remove();

                    }

                    return { fileName: sess.file_name, fileSize: sess.file_size, ztStatus: ztStatus };

                window.handleSftOpener = handleSftOpener;
                window.handleSftChunk = handleSftChunk;
                window.handleSftComplete = handleSftComplete;

                // ── Agent outbound display (interim 2026-04-28) ───────────────
                // CLI/agent-originated tunnel sends are recorded in ChatStream
                // (tagged sender_type=:claude|:user|:system). The local browser
                // doesn't see them via /api/tunnel/tcp/inbox (which is inbound only),
                // so we fetch /api/chat/stream and render outbound entries with a

                if (!window._agentOutboundPollStarted) {

                        var xhr = new XMLHttpRequest();
                        xhr.open('GET', '/api/chat/stream', true);

                            try {
                                var d = JSON.parse(xhr.responseText);
                                var msgs = (d && d.messages) || [];

                                    if (!m || typeof m.id !== 'number') return;
                                    if (m.id <= window._chatStreamLastId) return;
                                    window._chatStreamLastId = m.id;
                                    if (m.direction !== 'out') return;
                                    var senderType = m.sender_type || 'unknown';
                                    if (senderType === 'user') return; // skip browser-user-own (already shown locally)
                                    // Render agent / system / other outbound with badge

                                                       senderType === 'system' ? '⚙️ System' :
                                                       ('🛰 ' + senderType);
                                    var preview = m.text || '';
                                    if (preview.length > 600) preview = preview.slice(0, 600) + '…';
                                    // If looks like an encrypted JSON envelope, mask details
                                    try {
                                        var parsed = JSON.parse(preview);
                                        if (parsed && (parsed.type || '').indexOf('qrypto_chat_encrypted') === 0) {
                                            preview = '[encrypted chat envelope, v=' + (parsed.v || '?') +
                                                      ', recipient_fp=' + ((parsed.recipient && parsed.recipient.fingerprint) || (parsed.recipients && parsed.recipients[0] && parsed.recipients[0].fingerprint) || '?') + ']';
                                        } else if (parsed && (parsed.type || '').indexOf('sft_') === 0) {
                                            preview = '[SFT ' + parsed.type + ' session=' + ((parsed.session_id || '').slice(0,12)) +

                                        }
                                    } catch(e) {}
                                    var when = new Date(m.timestamp || Date.now()).toLocaleTimeString();

                                });
                            } catch(e) {}
                        };
                        xhr.send();
                    }, 2000);
                }

                    window._chatPollStarted = true;
                    window._chatLastPoll = Date.now();
                    setInterval(function() {
                        var xhr = new XMLHttpRequest();
                        xhr.open('GET', '/api/tunnel/tcp/inbox', true);
                        xhr.onload = async function() {
                            try {
                                var d = JSON.parse(xhr.responseText);
                                var msgs = d.messages || [];
                                for (var i = 0; i < msgs.length; i++) {
                                    var m = msgs[i];
                                    var ts = new Date(m.timestamp).getTime();

                                        var sender = m.peer || 'peer';
                                        var device = m.peer || '?';
                                        var verified = false;
                                        try {
                                            var parsed = JSON.parse(m.plaintext);

                                                    var decrypted = await decryptChatPkg(parsed);
                                                    text = decrypted.text;
                                                    sender = decrypted.sender || parsed.sender.name;
                                                    device = decrypted.senderDevice || parsed.sender.device;
                                                    verified = true;
                                                } catch(de) {
                                                    text = '[Encrypted message — decrypt failed: ' + de.message + ']';
                                                    sender = parsed.sender ? parsed.sender.name : 'unknown';
                                                    device = parsed.sender ? parsed.sender.device : '?';
                                                }
                                            } else if (parsed.type === 'qrypto_chat_encrypted_group') {

                                                    var decrypted = await decryptChatPkgGroup(parsed);
                                                    text = '[group] ' + decrypted.text;
                                                    sender = decrypted.sender || parsed.sender.name;
                                                    device = decrypted.senderDevice || parsed.sender.device;
                                                    verified = true;
                                                } catch(de) {
                                                    text = '[Group message — decrypt failed: ' + de.message + ']';
                                                    sender = parsed.sender ? parsed.sender.name : 'unknown';
                                                    device = parsed.sender ? parsed.sender.device : '?';
                                                }
                                            } else if (parsed.type === 'sft_opener') {
                                                try {
                                                    var op = await handleSftOpener(parsed);

                                                    sender = parsed.senderFp || 'sft';
                                                    device = (parsed.senderFp || '').slice(0, 8);
                                                    verified = true;
                                                } catch(de) {

                                                try {
                                                    var done = await handleSftComplete(parsed);
